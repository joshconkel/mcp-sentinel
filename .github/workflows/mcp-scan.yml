name: MCP Security Scan

permissions:
  contents: read
  actions: read
  packages: read

on:
  push:
    branches: [main, develop]
    paths:
      - "**.json"
      - "**.yaml"
      - "**.yml"
      - "mcp_sentinel/**"
      - "tests/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      schema:
        description: "Path to MCP server definition to scan"
        required: false
        default: "tests/fixtures/MCPS-007-malicious.json"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check mcp_sentinel/ tests/

  # ── Test suite ────────────────────────────────────────────────────────────
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate rules
        run: mcp-sentinel rules validate

      - name: Check source staleness
        run: mcp-sentinel sources check --warn-after 180
        continue-on-error: true   # Informational only; don't block CI

      - name: Run test suite
        # -v           verbose output so each test class and name is visible
        # --tb=short   compact tracebacks on failure
        # -x           stop on first failure (faster feedback in CI)
        # Xfail tests for MCPS-010/015/018/019 will show as xfail until the
        # base.py schema_analysis compile fix is merged; they do not break CI.
        run: |
          pytest tests/ -v --tb=short -x \
            --cov=mcp_sentinel \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ── Benign fixture scan — must produce zero findings ──────────────────────
  scan-benign:
    name: Benign Fixture (expect zero findings)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-sentinel
        run: pip install -e .

      - name: Scan benign fixture
        run: |
          mcp-sentinel scan \
            --schema tests/fixtures/benign-server.json \
            --report json \
            --out benign-results.json \
            --fail-on NONE

      - name: Assert zero findings
        run: |
          python3 - <<'EOF'
          import json, sys
          data = json.load(open("benign-results.json"))
          findings = data.get("findings", [])
          score    = data.get("score", {})
          print(f"Risk score: {score.get('overall', '?')}/100 [{score.get('label', '?')}]")
          print(f"Findings:   {len(findings)}")
          if findings:
              for f in findings:
                  print(f"  UNEXPECTED [{f['severity']:8}] {f['rule_id']} — {f['rule_name']}")
                  print(f"    field={f['field']}  match={f.get('match','')[:60]}")
              print("\nERROR: benign-server.json produced findings. Update fixture or rule.")
              sys.exit(1)
          print("\nOK: benign fixture is clean against all 28 rules.")
          EOF

  # ── Demo scans — one per rule category ───────────────────────────────────
  scan-demo:
    name: Demo Scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Active rules — dedicated check modules
          - name: "MCPS-001 tool-poisoning"
            fixture: "tests/fixtures/MCPS-001-malicious.json"
          - name: "MCPS-002 secrets"
            fixture: "tests/fixtures/MCPS-002-malicious.json"
          - name: "MCPS-005 supply-chain"
            fixture: "tests/fixtures/MCPS-005-malicious.json"
          # Experimental rules — generic module, CRITICAL severity
          - name: "MCPS-007 jailbreak"
            fixture: "tests/fixtures/MCPS-007-malicious.json"
          - name: "MCPS-008 url-credentials"
            fixture: "tests/fixtures/MCPS-008-malicious.json"
          - name: "MCPS-016 self-grant"
            fixture: "tests/fixtures/MCPS-016-malicious.json"
          - name: "MCPS-019 code-param"
            fixture: "tests/fixtures/MCPS-019-malicious.json"
          # Experimental rules — generic module, other categories
          - name: "MCPS-009 dangerous-names"
            fixture: "tests/fixtures/MCPS-009-malicious.json"
          - name: "MCPS-020 placeholder-creds"
            fixture: "tests/fixtures/MCPS-020-malicious.json"
          - name: "MCPS-025 cross-agent"
            fixture: "tests/fixtures/MCPS-025-malicious.json"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-sentinel
        run: pip install -e .

      - name: Scan ${{ matrix.name }}
        run: |
          mcp-sentinel scan \
            --schema ${{ matrix.fixture }} \
            --report json \
            --out scan-${{ strategy.job-index }}.json \
            --fail-on NONE   # Fixtures are designed to produce findings; don't fail CI

      - name: Display findings
        run: |
          python3 - <<'EOF'
          import json, sys
          data     = json.load(open("scan-${{ strategy.job-index }}.json"))
          score    = data["score"]
          findings = data["findings"]
          print(f"Fixture:    ${{ matrix.fixture }}")
          print(f"Risk score: {score['overall']}/100 [{score['label']}]")
          print(f"Findings:   {len(findings)}")
          for f in findings:
              tag = "[xfail]" if f.get("experimental") else ""
              print(f"  [{f['severity']:8}] {f['rule_id']} {tag} — {f['rule_name']}")
          if not findings:
              print("WARNING: malicious fixture produced zero findings — check rule patterns.")
              sys.exit(1)
          EOF

      - name: Upload scan result
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ matrix.name }}
          path: scan-${{ strategy.job-index }}.json
          retention-days: 14

  # ── Manual / dispatch scan ────────────────────────────────────────────────
  scan-dispatch:
    name: Scan (workflow_dispatch)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-sentinel
        run: pip install -e .

      - name: Scan ${{ github.event.inputs.schema }}
        run: |
          mcp-sentinel scan \
            --schema "${{ github.event.inputs.schema }}" \
            --report json \
            --out dispatch-results.json \
            --fail-on NONE

      - name: Display results
        run: |
          python3 - <<'EOF'
          import json
          data     = json.load(open("dispatch-results.json"))
          score    = data["score"]
          findings = data["findings"]
          print(f"Risk Score: {score['overall']}/100 [{score['label']}]")
          print(f"Findings:   {len(findings)}")
          for f in findings:
              exp = " [experimental]" if f.get("experimental") else ""
              print(f"  [{f['severity']:8}] {f['rule_id']}{exp} — {f['rule_name']}")
              print(f"             field={f['field']}  match={str(f.get('match',''))[:60]}")
          EOF

      - name: Upload dispatch results
        uses: actions/upload-artifact@v4
        with:
          name: mcp-sentinel-dispatch-results
          path: dispatch-results.json
          retention-days: 30
