name: MCP Security Scan

on:
  push:
    branches: [main, develop]
    paths:
      - "**.json"
      - "**.yaml"
      - "**.yml"
      - "mcp_sentinel/**"
      - "rules/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      schema:
        description: "Path to MCP server definition to scan"
        required: false
        default: "tests/fixtures/MCPS-001-malicious.json"

jobs:
  # ── Run the test suite ────────────────────────────────────────────────────
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate rules
        run: mcp-sentinel rules validate

      - name: Check source staleness
        run: mcp-sentinel sources check --warn-after 180
        continue-on-error: true   # Informational only; don't block CI

      - name: Run test suite
        run: pytest tests/ -v --tb=short --cov=mcp_sentinel --cov-report=term-missing

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check mcp_sentinel/ tests/

  # ── Scan a fixture as a demo of CI/CD integration ────────────────────────
  scan-demo:
    name: Scan Demo (fixture)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-sentinel
        run: pip install -e .

      - name: Scan test fixture (expect findings)
        run: |
          mcp-sentinel scan \
            --schema tests/fixtures/MCPS-001-malicious.json \
            --report json \
            --out scan-results.json \
            --fail-on NONE   # Don't fail CI on a fixture that is meant to have findings
        continue-on-error: false

      - name: Display results summary
        run: |
          python3 -c "
          import json
          data = json.load(open('scan-results.json'))
          score = data['score']
          findings = data['findings']
          print(f'Risk Score: {score[\"overall\"]}/100 [{score[\"label\"]}]')
          print(f'Findings: {len(findings)}')
          for f in findings:
              print(f'  [{f[\"severity\"]:8}] {f[\"rule_id\"]} — {f[\"rule_name\"]}')
          "

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: mcp-sentinel-scan-results
          path: scan-results.json
          retention-days: 30
