id: MCPS-119
name: Poisoned Model Distribution via MCP Server
status: experimental
severity: HIGH
category: supply-chain
detection_type: static
description: MCP server definitions may reference or bundle poisoned machine learning
  models from untrusted registries. Adversaries distribute these models to compromise
  downstream AI agents or exfiltrate data when the model is loaded or invoked during
  tool execution.
targets:
- field: server.url
- field: server.packages[]
- field: tool.description
detection:
  patterns:
  - type: regex
    description: References to public model registries without integrity verification
    expression: (huggingface|modelscope|civitai|github).{0,40}(model|checkpoint|weights|safetensors)
    flags:
    - IGNORECASE
  - type: regex
    description: Instructions to load models bypassing safety or verification checks
    expression: (load|download|fetch|import).{0,40}(model|weights|checkpoint).{0,30}(unsafe|bypass|skip|disable|verify)
    flags:
    - IGNORECASE
  - type: value_check
    description: Missing integrity or signature fields in package definitions
    condition:
      missing_fields:
      - integrity
      - hash
      - signature
      - checksum
    severity_override: MEDIUM
mappings:
  mitre-atlas:
    id: AML.T0058
    name: Publish Poisoned Models
    url: https://atlas.mitre.org/techniques/AML.T0058
  owasp-mcp:
    id: MCP08
    name: Insecure MCP Component Supply Chain
    url: https://owasp.org/www-project-mcp-top-10/#mcp08
  owasp-llm:
    id: LLM06
    name: Supply Chain Vulnerabilities
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
remediation: (1) Maintain an AI Bill of Materials (AI BOM) tracking all model artifacts
  and dependencies. (2) Enforce cryptographic verification of model weights and checkpoints
  before loading. (3) Restrict model sources to allowlisted, trusted registries with
  provenance tracking. (4) Scan downloaded models for malicious payloads using static
  analysis tools like Picklescan.
references:
- https://atlas.mitre.org/techniques/AML.T0058
tags:
- supply-chain
- model-poisoning
- static
- ai-bom
added: '2026-05-22'
updated: '2026-05-22'
