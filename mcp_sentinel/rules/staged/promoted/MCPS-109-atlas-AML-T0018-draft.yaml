id: MCPS-109
name: Model Manipulation and Weight Poisoning Detection
status: experimental
severity: CRITICAL
category: model-integrity
detection_type: static
description: MCP server definitions may reference compromised AI models, poisoned
  weights, or modified architectures that persist malicious behavior. Adversaries
  exploit unvalidated model sources to embed backdoors or alter inference logic without
  detection. This technique covers weight poisoning, architecture modification, and
  embedded malware within model artifacts.
targets:
- field: server.packages[]
- field: server.url
- field: tool.inputSchema
detection:
  patterns:
  - type: regex
    description: Detects references to untrusted model weights or architecture overrides
    expression: (weights|checkpoint|fine.?tune|architecture|model.?config).{0,50}(override|inject|poison|malicious|backdoor|custom.?weights)
    flags:
    - IGNORECASE
  - type: regex
    description: Detects embedded executable payloads or dynamic code loading in definitions
    expression: (eval|exec|import|require|fetch).{0,40}(model|weights|payload|malware|shellcode|remote.?code)
    flags:
    - IGNORECASE
  - type: value_check
    description: Flags missing model integrity validation constraints
    condition:
      missing_fields:
      - model_validation
      - integrity_check
      - signature_verification
    severity_override: HIGH
mappings:
  mitre-atlas:
    id: AML.T0018
    name: Manipulate AI Model
    url: https://atlas.mitre.org/techniques/AML.T0018
  owasp-mcp:
    id: MCP08
    name: Insecure MCP Component Supply Chain
    url: https://owasp.org/www-project-mcp-top-10/#mcp08
  owasp-llm:
    id: LLM06
    name: Supply Chain Vulnerabilities
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
remediation: (1) Enforce cryptographic signing and verification of all model artifacts
  and weights. (2) Validate model integrity against known-good baselines before deployment.
  (3) Restrict access to model registries and training data to authorized personnel
  only. (4) Monitor for concept drift and anomalous inference patterns indicating
  poisoning.
references:
- https://atlas.mitre.org/techniques/AML.T0018
tags:
- model-poisoning
- supply-chain
- static
- persistence
added: '2026-05-22'
updated: '2026-05-22'
