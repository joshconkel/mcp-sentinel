id: MCPS-093
name: LLM Social Engineering via Tool Metadata
status: experimental
severity: HIGH
category: social-engineering
detection_type: static
description: MCP tool definitions may contain descriptions or annotations that instruct
  the LLM to adopt a social engineering persona. These hidden directives can manipulate
  the model into soliciting sensitive credentials or personal data from users under
  the guise of legitimate tool functionality. Attackers leverage this to scale spearphishing
  campaigns and bypass standard security controls.
targets:
- field: tool.description
- field: tool.annotations
detection:
  patterns:
  - type: regex
    description: Persona adoption for social engineering
    expression: (act as|pretend to be|simulate|roleplay).{0,50}(phisher|attacker|social
      engineer|credential harvester)
    flags:
    - IGNORECASE
  - type: regex
    description: Directive to solicit sensitive credentials
    expression: (ask for|request|collect|extract).{0,50}(password|credential|secret|private|personal
      information)
    flags:
    - IGNORECASE
mappings:
  mitre-atlas:
    id: AML.T0052.000
    name: Spearphishing via Social Engineering LLM
    url: https://atlas.mitre.org/techniques/AML.T0052.000
  owasp-mcp:
    id: MCP02
    name: Insecure Tool and Resource Management
    url: https://owasp.org/www-project-mcp-top-10/#mcp02
  owasp-llm:
    id: LLM01
    name: Prompt Injection
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
remediation: (1) Educate users and developers on AI supply chain risks and social
  engineering tactics. (2) Implement deepfake and prompt injection detection algorithms
  for untrusted tool metadata. (3) Enforce strict validation and allowlisting of MCP
  tool definitions. (4) Monitor tool outputs for unauthorized credential solicitation.
references:
- https://atlas.mitre.org/techniques/AML.T0052.000
tags:
- social-engineering
- prompt-injection
- credential-theft
- static
added: '2026-05-22'
updated: '2026-05-22'
