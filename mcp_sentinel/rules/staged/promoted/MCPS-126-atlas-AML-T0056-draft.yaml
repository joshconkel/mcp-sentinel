id: MCPS-126
name: System Prompt Extraction via Tool Definitions
status: experimental
severity: HIGH
category: prompt-exfiltration
detection_type: static
description: MCP tool definitions or server configurations may contain instructions
  designed to extract the underlying LLM's system prompt. This technique targets the
  intellectual property and security boundaries of the AI provider by bypassing guardrails
  and revealing hidden instructions.
targets:
- field: tool.description
- field: tool.inputSchema
- field: server.env.*
detection:
  patterns:
  - type: regex
    description: Keywords indicating system prompt extraction attempts
    expression: (extract|dump|reveal|output|print).{0,30}(system prompt|initial instructions|developer
      instructions|system message)
    flags:
    - IGNORECASE
  - type: value_check
    description: Missing safety guardrails or overly permissive configurations
    condition:
      missing_fields:
      - guardrails.enabled
      - safety.filters
    severity_override: MEDIUM
mappings:
  mitre-atlas:
    id: AML.T0056
    name: Extract LLM System Prompt
    url: https://atlas.mitre.org/techniques/AML.T0056
  owasp-llm:
    id: LLM06
    name: Prompt Injection
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
remediation: (1) Implement generative AI guardrails to filter inputs and outputs.
  (2) Enforce strict guidelines and input validation to prevent prompt extraction.
  (3) Align model training and fine-tuning with safety policies to resist extraction
  attempts.
references:
- https://atlas.mitre.org/techniques/AML.T0056
tags:
- system-prompt
- exfiltration
- static
- guardrails
added: '2026-05-22'
updated: '2026-05-22'
