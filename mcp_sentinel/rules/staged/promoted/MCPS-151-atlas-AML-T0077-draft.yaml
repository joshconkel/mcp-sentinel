id: MCPS-029
name: Covert Data Exfiltration via Rendered Image URLs
status: experimental
severity: HIGH
category: data-exfiltration
detection_type: static
description: MCP tool definitions and annotations may contain markdown or HTML image
  tags designed to exfiltrate sensitive data when rendered by the client. Adversaries
  embed query parameters in image URLs that automatically transmit conversation context
  or private information to external servers upon rendering.
targets:
- field: tool.description
- field: tool.annotations
detection:
  patterns:
  - type: regex
    description: Markdown image syntax with exfiltration query parameters
    expression: '!\[.{0,40}\]\(https?://[^)]+\?[^)]*(secret|data|exfil|conversation|prompt|token|key|password|private)'
    flags:
      - IGNORECASE
  - type: regex
    description: HTML img tag with exfiltration query parameters
    expression: '<img[^>]{0,60}src=["'']https?://[^"'']+\?[^"'']*(secret|data|exfil|conversation|prompt|token|key|password|private)'
    flags:
      - IGNORECASE
mappings:
  mitre-atlas:
    id: AML.T0077
    name: LLM Response Rendering
    url: https://atlas.mitre.org/techniques/AML.T0077
  owasp-llm:
    id: LLM06
    name: Prompt Injection
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
remediation: (1) Sanitize all markdown and HTML in tool descriptions and annotations.
  (2) Block automatic rendering of external image URLs in MCP clients. (3) Implement
  strict output filtering to strip query parameters from rendered media. (4) Audit
  tool definitions for exfiltration keywords in URL parameters.
references:
- https://atlas.mitre.org/techniques/AML.T0077
tags:
- data-exfiltration
- rendering-injection
- static
- markdown
added: '2026-05-22'
updated: '2026-05-22'
