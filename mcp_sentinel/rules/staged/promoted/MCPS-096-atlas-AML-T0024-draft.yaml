id: MCPS-096
name: Exfiltration via Unrestricted AI Inference API
status: experimental
severity: HIGH
category: data-exfiltration
detection_type: static
description: MCP server definitions may configure tools or transports that route sensitive
  data to external AI inference APIs without proper safeguards. Adversaries can exploit
  these configurations to exfiltrate private training data, invert models, or extract
  model weights through excessive or unauthenticated queries. This technique highlights
  the risk of unmonitored inference endpoints in agentic workflows.
targets:
- field: tool.description
- field: tool.inputSchema
- field: server.url
- field: server.env.*
detection:
  patterns:
  - type: regex
    description: Detects tool configurations enabling model extraction or inversion
    expression: (extract|dump|invert|membership.{0,20}inference|leak.{0,20}training).{0,40}(model|weights|parameters|data)
    flags:
    - IGNORECASE
  - type: value_check
    description: Identifies missing authentication or rate-limiting constraints
    condition:
      missing_fields:
      - apiKey
      - authToken
      - rateLimit
      - quota
    severity_override: MEDIUM
  - type: regex
    description: Flags untrusted or unrestricted inference endpoints
    expression: (api|inference|llm|model).{0,30}(public|open|unrestricted|no-auth|free-tier)
    flags:
    - IGNORECASE
mappings:
  mitre-atlas:
    id: AML.T0024
    name: Exfiltration via AI Inference API
    url: https://atlas.mitre.org/techniques/AML.T0024
  owasp-llm:
    id: LLM06
    name: Sensitive Information Disclosure
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
remediation: (1) Restrict the number and rate of AI model queries via rate limiting.
  (2) Enforce strict authentication and access controls for all inference API endpoints.
  (3) Implement comprehensive telemetry logging for model inputs, outputs, and agent
  actions to detect anomalous exfiltration attempts. (4) Validate and sanitize all
  data sent to external AI services.
references:
- https://atlas.mitre.org/techniques/AML.T0024
tags:
- data-exfiltration
- model-inversion
- api-security
- static
added: '2026-05-22'
updated: '2026-05-22'
