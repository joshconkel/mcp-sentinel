    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Audit tool descriptions and annotations for environmental checks
    or evasion logic. (2) Restrict tools from querying system environment variables
    or process lists. (3) Implement runtime sandboxing and strict execution boundaries
    for MCP tool invocation. (4) Validate definitions against known evasion signatures
    and signed manifests.
  references:
  - https://atlas.mitre.org/techniques/AML.T0097
  tags:
  - sandbox-evasion
  - defense-evasion
  - static
  - vm-detection
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-084
  name: Deceptive Agent Baiting via Tool Metadata
  status: experimental
  severity: HIGH
  category: agent-manipulation
  detection_type: static
  description: MCP tool definitions and server URLs may contain deceptive language
    or links designed to manipulate AI agents into performing unintended actions.
    These patterns exploit the agent's reliance on metadata for context, potentially
    leading to unauthorized command execution or data exfiltration.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Social engineering cues disguised as UI instructions
      expression: (copy|paste|run|execute|click|trust|ignore|bypass).{0,50}(command|code|script|warning|security|prompt|instruction)
      flags:
      - IGNORECASE
    - type: regex
      description: Urgency or deception language mimicking clickbait prompts
      expression: (urgent|critical|immediate|verify|update|fix|alert).{0,40}(now|here|required|action|needed)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0100
      name: AI Agent Clickbait
      url: https://atlas.mitre.org/techniques/AML.T0100
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Audit tool descriptions and annotations for social engineering
    language. (2) Implement strict content validation and allowlisting for server
    URLs. (3) Deploy agent-side guardrails to verify metadata before execution. (4)
    Educate developers on clickbait patterns targeting AI agents.
  references:
  - https://atlas.mitre.org/techniques/AML.T0100
  tags:
  - agent-manipulation
  - clickbait
  - social-engineering
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-085
  name: Malicious Link Execution in MCP Definitions
  status: experimental
  severity: HIGH
  category: url-integrity
  detection_type: static
  description: MCP server and tool definitions may contain hardcoded URLs or links
    that point to malicious payloads or exploit scripts. When an AI agent automatically
    follows these links without proper origin validation or sandboxing, it can lead
    to remote code execution or unauthorized data exfiltration. This technique exploits
    the agent's trust in predefined connection endpoints.
  targets:
  - field: server.url
  - field: tool.description
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Dangerous URI schemes or script injection in links
      expression: (javascript|data|vbscript):.{0,60}
      flags:
      - IGNORECASE
    - type: regex
      description: External URLs with execution-oriented parameters or paths
      expression: (https?://).{0,40}(cmd|exec|run|script|payload|shell|eval|system)(=|/)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0011.003
      name: Malicious Link
      url: https://atlas.mitre.org/techniques/AML.T0011.003
    owasp-mcp:
      id: MCP04
      name: Insecure Agent Communication
      url: https://owasp.org/www-project-mcp-top-10/#mcp04
  remediation: (1) Validate and sanitize all URLs in MCP definitions against a strict
    allowlist. (2) Disable automatic link following or require explicit user confirmation
    before fetching external resources. (3) Implement origin validation and sandboxing
    for all outbound agent requests. (4) Scan definitions for dangerous URI schemes
    and execution parameters.
  references:
  - https://atlas.mitre.org/techniques/AML.T0011.003
  tags:
  - malicious-link
  - rce
  - url-validation
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-086
  name: Reputation Inflation via Fabricated Trust Signals
  status: experimental
  severity: HIGH
  category: supply-chain-trust
  detection_type: static
  description: Adversaries embed fabricated trust signals, fake endorsements, or inflated
    adoption metrics in MCP tool and server definitions to appear legitimate. These
    deceptive metadata claims bypass human and automated trust checks, increasing
    the likelihood of adoption before malicious updates are deployed.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.url
  - field: server.packages[]
  detection:
    patterns:
    - type: regex
      description: Fabricated verification or endorsement claims
      expression: (official|verified|trusted|endorsed|certified).{0,40}(by|from|with|for).{0,40}(google|openai|meta|microsoft|aws|github|npm|pypi|registry)
      flags:
      - IGNORECASE
    - type: regex
      description: Inflated adoption metrics or fake popularity claims
      expression: (downloads|stars|forks|users|installations).{0,30}(over|more.?than|exceeds|surpasses|reached).{0,20}(\d{3,})
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0111
      name: AI Supply Chain Reputation Inflation
      url: https://atlas.mitre.org/techniques/AML.T0111
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Verify publisher identity through cryptographic signatures or official
    registry attestations. (2) Cross-reference claimed endorsements and metrics with
    authoritative sources. (3) Implement strict allowlisting for MCP components and
    avoid relying on self-reported trust signals. (4) Monitor for sudden changes in
    component behavior after initial adoption.
  references:
  - https://atlas.mitre.org/techniques/AML.T0111
  tags:
  - supply-chain
  - reputation-inflation
  - defense-evasion
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-087
  name: Model Replication via Unrestricted Inference Tools
  status: experimental
  severity: HIGH
  category: model-extraction
  detection_type: static
  description: MCP server definitions exposing model inference capabilities without
    rate limiting or output obfuscation enable adversaries to systematically query
    the API. Collected input-output pairs can train a surrogate model that replicates
    the target's behavior, facilitating downstream evasion or adversarial attacks.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Detects unbounded inference or generation endpoints
      expression: (inference|generate|complete|predict).{0,60}(unlimited|no.?limit|open.?access|public.?endpoint)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Input schema lacks constraints on query volume or payload size
      condition:
        missing_constraints:
        - maxItems
        - maxLength
        - rateLimit
    - type: value_check
      description: Server URL points to public or unauthenticated inference API
      condition:
        value_in:
        - http://
        - public-api.
        - demo.
        matches_unpinned: true
  mappings:
    mitre-atlas:
      id: AML.T0005.001
      name: Train Proxy via Replication
      url: https://atlas.mitre.org/techniques/AML.T0005.001
    nist-ai-rmf:
      id: PR.AIML-1
      name: AI Model Protection
      url: https://csrc.nist.gov/projects/risk-management-framework
  remediation: (1) Implement rate limiting and query quotas on all inference endpoints.
    (2) Apply output obfuscation or truncation to reduce model fidelity leakage. (3)
    Enable comprehensive AI telemetry logging to detect systematic probing patterns.
    (4) Restrict access to model APIs using authentication and allowlisting.
  references:
  - https://atlas.mitre.org/techniques/AML.T0005.001
  tags:
  - model-replication
  - surrogate-training
  - rate-limiting
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-088
  name: AI Model and Dataset Exfiltration via MCP Tools
  status: experimental
  severity: HIGH
  category: ai-ip-theft
  detection_type: static
  description: MCP server definitions may expose tools or resources that facilitate
    the unauthorized extraction of proprietary AI models, training datasets, or API
    credentials. Adversaries leverage these exposed interfaces to replicate models
    or dump sensitive training data, causing significant economic harm and intellectual
    property loss.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Detects tools or resources configured to export or dump AI models
        and training data
      expression: (export|download|dump|extract|replicate).{0,40}(model|weights|dataset|checkpoint)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies mechanisms for bypassing API limits or exposing credentials
        for AI services
      expression: (bypass|unlimited|rate.limit|api.key|token).{0,40}(ai.service|llm|model.provider|openai|anthropic|huggingface)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0048.004
      name: AI Intellectual Property Theft
      url: https://atlas.mitre.org/techniques/AML.T0048.004
    owasp-llm:
      id: LLM06
      name: Model Theft
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    owasp-mcp:
      id: MCP05
      name: Insecure Data Handling
      url: https://owasp.org/www-project-mcp-top-10/
  remediation: (1) Implement strict access controls on model registries and training
    datasets. (2) Encrypt AI artifacts at rest and in transit. (3) Serve models via
    secure cloud APIs rather than exposing local files or direct download endpoints.
    (4) Monitor and rate-limit AI service API usage to prevent unauthorized replication.
  references:
  - https://atlas.mitre.org/techniques/AML.T0048.004
  tags:
  - ai-ip-theft
  - model-exfiltration
  - static
  - data-leak
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-089
  name: Unrestricted RAG Database Access via MCP Tools
  status: experimental
  severity: HIGH
  category: data-access-control
  detection_type: static
  description: MCP tools configured to query RAG or vector databases may lack proper
    access controls, allowing adversaries to retrieve sensitive internal documents.
    This rule identifies tool definitions that expose broad document retrieval capabilities
    without explicit scoping or authentication constraints.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Identifies tools claiming to query RAG or vector stores
      expression: (rag|vector.?store|knowledge.?base|document.?retrieval).{0,50}(query|search|retrieve|access)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Input parameters lack required access control constraints
      condition:
        missing_constraints:
        - required
        - enum
        - pattern
    - type: regex
      description: Detects overly permissive data retrieval scope
      expression: (unrestricted|any|all|full).{0,30}(access|documents|data|retrieval|scope)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0085.000
      name: RAG Databases
      url: https://atlas.mitre.org/techniques/AML.T0085.000
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Implement AI telemetry logging for all RAG queries and agent actions.
    (2) Enforce privileged and single-user permission configurations to restrict data
    access. (3) Segment AI agent components and isolate vector store access with strict
    API controls. (4) Validate tool input schemas to require explicit scoping parameters
    such as tenant_id or user_role.
  references:
  - https://atlas.mitre.org/techniques/AML.T0085.000
  tags:
  - rag-security
  - data-exfiltration
  - static
  - access-control
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-090
  name: MCP Server Machine Compromise via Tool Execution
  status: experimental
  severity: CRITICAL
  category: system-integrity
  detection_type: static
  description: MCP server definitions may expose tools or dependencies that allow
    arbitrary code execution or payload delivery on the host machine. Adversaries
    exploit unrestricted input schemas or compromised packages to gain system-level
    access and persist. Static analysis identifies dangerous command references and
    missing validation constraints before deployment.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.packages[]
  detection:
    patterns:
    - type: regex
      description: Detects references to system command execution or payload retrieval
        in tool metadata
      expression: (curl|wget|powershell|bash|sh|exec|eval|system).{0,50}(http|payload|malware|reverse|shell|command)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Identifies input schemas lacking constraints on command or script
        parameters
      condition:
        field_name_matches:
          regex: (command|script|query|input)
          flags:
          - IGNORECASE
        field_type: string
        missing_constraints:
        - pattern
        - maxLength
        - enum
    - type: value_check
      description: Flags server dependencies with unpinned versions susceptible to
        supply chain compromise
      condition:
        matches_unpinned: true
      severity_override: HIGH
  mappings:
    mitre-atlas:
      id: AML.T0112
      name: Machine Compromise
      url: https://atlas.mitre.org/techniques/AML.T0112
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Restrict tool capabilities to read-only or sandboxed environments.
    (2) Enforce strict input validation and schema constraints on all command parameters.
    (3) Pin all server dependencies to specific, verified versions. (4) Implement
    runtime execution policies to block unauthorized system calls.
  references:
  - https://atlas.mitre.org/techniques/AML.T0112
  tags:
  - machine-compromise
  - arbitrary-code-execution
  - supply-chain
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-091
  name: Model Extraction via Unrestricted Query Tools
  status: experimental
  severity: HIGH
  category: model-integrity
  detection_type: static
  description: MCP server definitions may expose tools that facilitate model extraction
    or distillation by allowing unrestricted querying, exposing raw model outputs,
    or lacking rate limiting and telemetry. Adversaries leverage these configurations
    to collect inference data for training surrogate models offline.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Distillation or extraction keywords in metadata
      expression: (distill|extract|replicate|surrogate|clone).{0,50}(model|output|inference|behavior)
      flags:
      - IGNORECASE
    - type: value_check
      description: Missing rate limiting or telemetry controls
      condition:
        missing_fields:
        - rate_limit
        - max_queries
        - telemetry_enabled
        - logging
    - type: regex
      description: Raw or unfiltered model output exposure
      expression: (raw|unfiltered|full|verbose).{0,40}(output|response|generation|model)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0024.002
      name: Extract AI Model
      url: https://atlas.mitre.org/techniques/AML.T0024.002
    owasp-llm:
      id: LLM06
      name: Model Theft
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Implement passive output obfuscation to reduce inference fidelity.
    (2) Enforce strict rate limits and query quotas per user or session. (3) Enable
    comprehensive AI telemetry logging for inputs, outputs, and agent steps. (4) Monitor
    for anomalous query patterns indicative of distillation campaigns.
  references:
  - https://atlas.mitre.org/techniques/AML.T0024.002
  tags:
  - model-extraction
  - distillation
  - rate-limiting
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-092
  name: Exposed Dataset and Model Artifact References
  status: experimental
  severity: MEDIUM
  category: data-exposure
  detection_type: static
  description: MCP server definitions may inadvertently expose URLs or paths to training
    datasets, model checkpoints, or internal data repositories. Adversaries can harvest
    these references to replicate models, craft adversarial examples, or tailor attacks
    against the victim organization. Limiting public release of such artifacts reduces
    the attack surface for model inversion and data poisoning.
  targets:
  - field: tool.description
  - field: server.url
  - field: server.env.*
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: References to training datasets or model artifacts in metadata
      expression: (dataset|training.data|model.checkpoint|weights|artifacts).{0,40}(url|link|path|bucket|storage)
      flags:
      - IGNORECASE
    - type: regex
      description: Cloud storage paths exposing model training data or checkpoints
      expression: (s3\.amazonaws\.com|storage\.cloud\.google\.com|blob\.core\.windows\.net).{0,50}(train|dataset|checkpoint|weights)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0002.000
      name: Datasets
      url: https://atlas.mitre.org/techniques/AML.T0002.000
    owasp-llm:
      id: LLM06
      name: Sensitive Information Disclosure
      url: https://owasp.org/www-project-top-10-llm-applications/
  remediation: (1) Audit MCP server definitions for exposed dataset or model artifact
    URLs. (2) Restrict public release of training data, model checkpoints, and technical
    project details. (3) Implement access controls and authentication for any referenced
    data repositories. (4) Use opaque identifiers instead of direct storage paths
    in tool schemas.
  references:
  - https://atlas.mitre.org/techniques/AML.T0002.000
  tags:
  - data-exposure
  - model-replication
  - static
  - reconnaissance
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-093
  name: LLM Social Engineering via Tool Metadata
  status: experimental
  severity: HIGH
  category: social-engineering
  detection_type: static
  description: MCP tool definitions may contain descriptions or annotations that instruct
    the LLM to adopt a social engineering persona. These hidden directives can manipulate
    the model into soliciting sensitive credentials or personal data from users under
    the guise of legitimate tool functionality. Attackers leverage this to scale spearphishing
    campaigns and bypass standard security controls.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Persona adoption for social engineering
      expression: (act as|pretend to be|simulate|roleplay).{0,50}(phisher|attacker|social
        engineer|credential harvester)
      flags:
      - IGNORECASE
    - type: regex
      description: Directive to solicit sensitive credentials
      expression: (ask for|request|collect|extract).{0,50}(password|credential|secret|private|personal
        information)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0052.000
      name: Spearphishing via Social Engineering LLM
      url: https://atlas.mitre.org/techniques/AML.T0052.000
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Educate users and developers on AI supply chain risks and social
    engineering tactics. (2) Implement deepfake and prompt injection detection algorithms
    for untrusted tool metadata. (3) Enforce strict validation and allowlisting of
    MCP tool definitions. (4) Monitor tool outputs for unauthorized credential solicitation.
  references:
  - https://atlas.mitre.org/techniques/AML.T0052.000
  tags:
  - social-engineering
  - prompt-injection
  - credential-theft
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-094
  name: Model Artifact Exposure in MCP Definitions
  status: experimental
  severity: MEDIUM
  category: model-artifact-exposure
  detection_type: static
  description: MCP server definitions may inadvertently expose references to model
    artifacts, configuration files, or training checkpoints. Adversaries can harvest
    these references to replicate victim models, tailor adversarial attacks, or inject
    backdoors into the AI pipeline.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  - field: server.packages[]
  detection:
    patterns:
    - type: regex
      description: References to model weight or checkpoint files
      expression: (model|checkpoint|weights|artifact)[-_]?(path|dir|file|url).{0,40}(\.onnx|\.h5|\.pkl|\.pth|\.pb|\.tflite)
      flags:
      - IGNORECASE
    - type: regex
      description: Exposure of model architecture or training configuration
      expression: (architecture|config|training|hyperparameter)[-_]?(file|path|url|spec).{0,40}(\.yaml|\.json|\.toml|\.py|\.cfg)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0002.001
      name: Models
      url: https://atlas.mitre.org/techniques/AML.T0002.001
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Limit public release of model artifacts and technical details.
    (2) Verify cryptographic checksums of all AI artifacts. (3) Remove hardcoded model
    paths and weights from MCP definitions. (4) Use environment variables or secure
    vaults for sensitive model references.
  references:
  - https://atlas.mitre.org/techniques/AML.T0002.001
  tags:
  - model-exposure
  - artifact-leak
  - supply-chain
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-095
  name: User Execution via Unsafe MCP Artifacts
  status: experimental
  severity: HIGH
  category: execution-control
  detection_type: static
  description: MCP server definitions may contain references to unverified packages,
    unsafe artifacts, or malicious links that rely on user interaction to trigger
    execution. Adversaries embed these elements to trick users or agents into loading
    compromised code or visiting phishing endpoints. Static analysis can identify
    suspicious execution triggers and untrusted resource references before deployment.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.packages[]
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Detects unsafe execution commands or artifact loading hints
      expression: (exec|eval|system|subprocess|pickle|unpickle|load_model).{0,40}(file|url|remote|download)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies social engineering prompts or malicious links
      expression: '(click|open|visit|download).{0,30}(http|https|ftp|file):'
      flags:
      - IGNORECASE
    - type: value_check
      description: Flags unpinned or unverified dependency packages
      condition:
        matches_unpinned: true
  mappings:
    mitre-atlas:
      id: AML.T0011
      name: User Execution
      url: https://atlas.mitre.org/techniques/AML.T0011
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Verify cryptographic checksums of all AI artifacts and packages.
    (2) Restrict library loading and disable unsafe deserialization formats like pickle.
    (3) Maintain an AI Bill of Materials to track provenance. (4) Educate users on
    identifying malicious links and social engineering attempts. (5) Scan server definitions
    for untrusted execution triggers before deployment.
  references:
  - https://atlas.mitre.org/techniques/AML.T0011
  tags:
  - user-execution
  - supply-chain
  - static
  - malicious-links
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-096
  name: Exfiltration via Unrestricted AI Inference API
  status: experimental
  severity: HIGH
  category: data-exfiltration
  detection_type: static
  description: MCP server definitions may configure tools or transports that route
    sensitive data to external AI inference APIs without proper safeguards. Adversaries
    can exploit these configurations to exfiltrate private training data, invert models,
    or extract model weights through excessive or unauthenticated queries. This technique
    highlights the risk of unmonitored inference endpoints in agentic workflows.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.url
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects tool configurations enabling model extraction or inversion
      expression: (extract|dump|invert|membership.{0,20}inference|leak.{0,20}training).{0,40}(model|weights|parameters|data)
      flags:
      - IGNORECASE
    - type: value_check
      description: Identifies missing authentication or rate-limiting constraints
      condition:
        missing_fields:
        - apiKey
        - authToken
        - rateLimit
        - quota
      severity_override: MEDIUM
    - type: regex
      description: Flags untrusted or unrestricted inference endpoints
      expression: (api|inference|llm|model).{0,30}(public|open|unrestricted|no-auth|free-tier)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0024
      name: Exfiltration via AI Inference API
      url: https://atlas.mitre.org/techniques/AML.T0024
    owasp-llm:
      id: LLM06
      name: Sensitive Information Disclosure
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Restrict the number and rate of AI model queries via rate limiting.
    (2) Enforce strict authentication and access controls for all inference API endpoints.
    (3) Implement comprehensive telemetry logging for model inputs, outputs, and agent
    actions to detect anomalous exfiltration attempts. (4) Validate and sanitize all
    data sent to external AI services.
  references:
  - https://atlas.mitre.org/techniques/AML.T0024
  tags:
  - data-exfiltration
  - model-inversion
  - api-security
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-097
  name: Model Inversion via Confidence Score Exposure
  status: experimental
  severity: HIGH
  category: model-inversion
  detection_type: static
  description: MCP server definitions that expose model confidence scores, raw probabilities,
    or lack query rate limits can enable model inversion attacks. Adversaries strategically
    query the inference API to reconstruct sensitive training data or private features.
    This rule flags configurations that inadvertently leak high-fidelity model outputs
    or permit unbounded querying.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects explicit configuration or documentation indicating exposure
        of model confidence scores or raw outputs
      expression: (confidence|probability|logit|raw_output|training_data).{0,30}(expose|return|output|visible|accessible|enabled)
      flags:
      - IGNORECASE
    - type: value_check
      description: Flags definitions lacking explicit query rate limits or budget
        constraints
      condition:
        missing_fields:
        - rate_limit
        - max_queries
        - query_budget
        - throttle
  mappings:
    mitre-atlas:
      id: AML.T0024.001
      name: Invert AI Model
      url: https://atlas.mitre.org/techniques/AML.T0024.001
  remediation: (1) Apply passive output obfuscation to reduce fidelity of confidence
    scores and raw outputs. (2) Enforce strict rate limits and query budgets per user
    or session. (3) Implement comprehensive AI telemetry logging to monitor and detect
    anomalous querying patterns.
  references:
  - https://atlas.mitre.org/techniques/AML.T0024.001
  tags:
  - model-inversion
  - data-privacy
  - static
  - confidence-leak
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-098
  name: Malicious Dependency in MCP Server Packages
  status: experimental
  severity: HIGH
  category: supply-chain
  detection_type: static
  description: MCP server definitions may declare external software packages that
    introduce malicious code or vulnerable dependencies. Adversaries exploit unpinned
    versions, hallucinated package names, or unverified registries to compromise the
    agent's runtime environment.
  targets:
  - field: server.packages[]
  detection:
    patterns:
    - type: value_check
      description: Unpinned or wildcard package versions
      condition:
        matches_unpinned: true
    - type: regex
      description: Suspicious package naming or typosquatting patterns
      expression: (^.{0,40}-dev$)|(^.{0,40}-test$)|(^.{0,40}-alpha$)|(^.{0,40}-beta$)|(^.{0,40}-rc$)|(^.{0,40}-backup$)|(^.{0,40}-update$)|(^.{0,40}-official$)|(^.{0,40}-secure$)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0011.001
      name: Malicious Package
      url: https://atlas.mitre.org/techniques/AML.T0011.001
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Enforce strict version pinning and cryptographic signature verification
    for all dependencies. (2) Restrict library loading to trusted registries and validate
    package integrity via checksums. (3) Maintain an AI Bill of Materials (AIBOM)
    to track provenance and enable rapid vulnerability response. (4) Train developers
    on supply chain risks and hallucinated package identification.
  references:
  - https://atlas.mitre.org/techniques/AML.T0011.001
  tags:
  - supply-chain
  - dependency-management
  - static
  - package-integrity
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-099
  name: Hardcoded Credentials in MCP Server Definition
  status: experimental
  severity: HIGH
  category: credential-exposure
  detection_type: static
  description: MCP server definition files may inadvertently contain hardcoded credentials,
    API keys, or authentication tokens within environment variables, URLs, or tool
    schemas. Static analysis detects these insecure storage practices to prevent credential
    leakage during deployment or version control. Exposed secrets can be harvested
    by adversaries to gain unauthorized access to backend services.
  targets:
  - field: server.env.*
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Hardcoded secrets in configuration fields
      expression: (?i)(password|passwd|api[_-]?key|secret|token|auth)[\s:=]+[A-Za-z0-9+/=]{8,40}
      flags:
      - IGNORECASE
    - type: regex
      description: Credentials embedded in server URLs
      expression: https?://[^\s:]{0,30}:[^\s@]{0,30}@
  mappings:
    mitre-atlas:
      id: AML.T0055
      name: Unsecured Credentials
      url: https://atlas.mitre.org/techniques/AML.T0055
    owasp-mcp:
      id: MCP04
      name: Insecure Authentication and Authorization
      url: https://owasp.org/www-project-mcp-top-10/#mcp04
  remediation: (1) Remove hardcoded credentials from definition files. (2) Use environment
    variable injection or secret management systems. (3) Enforce TLS for all server
    communications. (4) Validate tool schemas to reject credential inputs at runtime.
  references:
  - https://atlas.mitre.org/techniques/AML.T0055
  tags:
  - credential-exposure
  - hardcoded-secrets
  - static
  - configuration
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-100
  name: Untrusted Data Ingestion in Tool Definitions
  status: experimental
  severity: HIGH
  category: data-integrity
  detection_type: static
  description: MCP servers that ingest or process external datasets and training data
    without validation create supply chain vulnerabilities. Adversaries can poison
    these data sources to compromise model behavior or inject malicious payloads.
    Static analysis identifies tool definitions and schemas that accept untrusted
    data without sanitization constraints.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.packages[]
  detection:
    patterns:
    - type: regex
      description: References to external dataset ingestion or training data processing
      expression: (ingest|process|train|fine-tune|load).{0,50}(dataset|corpus|training
        data|external source|untrusted data)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Input schema fields accepting raw data without validation constraints
      condition:
        field_name_matches:
          regex: (data|input|payload|training|corpus)
          flags:
          - IGNORECASE
        missing_constraints:
        - maxLength
        - pattern
        - enum
  mappings:
    mitre-atlas:
      id: AML.T0010.002
      name: Data
      url: https://atlas.mitre.org/techniques/AML.T0010.002
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Implement strict access controls on internal model registries and
    training data repositories. (2) Sanitize all ingested datasets prior to processing
    using content filters and anomaly detection. (3) Verify cryptographic checksums
    of all AI artifacts and dataset sources. (4) Maintain detailed provenance records
    for all training data and modifications.
  references:
  - https://atlas.mitre.org/techniques/AML.T0010.002
  tags:
  - data-poisoning
  - supply-chain
  - static
  - input-validation
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-101
  name: MCP Tool Schema Lacks Adversarial Input Guards
  status: experimental
  severity: MEDIUM
  category: model-integrity
  detection_type: static
  description: MCP tool definitions that lack strict input constraints or sanitization
    directives can be exploited to feed adversarial examples to the underlying model.
    Over time, these inputs degrade model performance and erode system reliability,
    aligning with data poisoning and adversarial attack vectors. This static analysis
    identifies configurations that leave the inference pipeline vulnerable to integrity
    erosion.
  targets:
  - field: tool.inputSchema
  - field: tool.description
  detection:
    patterns:
    - type: schema_analysis
      description: Missing input constraints enabling adversarial payloads
      condition:
        field_type: string
        missing_constraints:
        - maxLength
        - pattern
        - format
    - type: regex
      description: Descriptions indicating unfiltered or raw model passthrough
      expression: (raw|unfiltered|unsanitized|no validation|direct passthrough).{0,40}(input|data|prompt|query)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0031
      name: Erode AI Model Integrity
      url: https://atlas.mitre.org/techniques/AML.T0031
    owasp-llm:
      id: LLM08
      name: Model Denial of Service
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Implement input restoration and sanitization preprocessing for
    all tool inputs. (2) Enforce strict schema constraints (maxLength, pattern, format)
    to block adversarial perturbations. (3) Deploy adversarial input detection algorithms
    prior to model inference. (4) Utilize ensemble methods or hardened models to increase
    robustness against poisoning and degradation attacks.
  references:
  - https://atlas.mitre.org/techniques/AML.T0031
  tags:
  - model-integrity
  - adversarial-input
  - data-poisoning
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-102
  name: Unrestricted Repository Data Access in MCP Tools
  status: experimental
  severity: HIGH
  category: data-collection
  detection_type: static
  description: MCP tools configured to query or scrape information repositories may
    expose sensitive organizational data to AI agents. Without strict input validation,
    authentication requirements, or data filtering, these tools can be abused to mass-collect
    credentials, source code, or proprietary documents. This aligns with adversary
    techniques that leverage misconfigured repositories for large-scale data collection.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects tools configured to query or extract data from sensitive
        repositories
      expression: (sharepoint|confluence|gitlab|github|sql|database|cloud storage|bucket|repository).{0,50}(query|search|export|download|list|access|fetch)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Identifies input schemas lacking authentication or access control
        constraints for repository connections
      condition:
        field_type: object
        missing_constraints:
        - authentication
        - access_control
        - query_limit
  mappings:
    mitre-atlas:
      id: AML.T0036
      name: Data from Information Repositories
      url: https://atlas.mitre.org/techniques/AML.T0036
    owasp-mcp:
      id: MCP04
      name: Insecure Data Handling
      url: https://owasp.org/www-project-mcp-top-10/#mcp04
  remediation: (1) Enforce strict authentication and authorization checks in tool
    input schemas. (2) Implement query limits and data filtering to prevent bulk exfiltration.
    (3) Audit repository connection configurations for hardcoded credentials or overly
    permissive access. (4) Log and monitor all repository access initiated by AI agents.
  references:
  - https://atlas.mitre.org/techniques/AML.T0036
  tags:
  - data-collection
  - repository-access
  - static
  - aml-t0036
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-103
  name: Backdoor Trigger Injection in Tool Definitions
  status: experimental
  severity: HIGH
  category: tool-integrity
  detection_type: static
  description: MCP tool definitions may contain hidden backdoor triggers designed
    to activate specific model behaviors when certain inputs are provided. These triggers
    are often obfuscated using zero-width characters, encoded strings, or conditional
    language that appears benign to humans but manipulates inference outcomes.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Conditional trigger language indicating hidden activation
      expression: (if|when|upon|triggered by).{0,40}(input|query|prompt|request).{0,30}(contains|matches|equals|includes)
      flags:
      - IGNORECASE
    - type: unicode
      description: Zero-width or invisible characters concealing trigger payloads
    - type: regex
      description: Encoded or obfuscated payload references
      expression: (base64|hex|encoded|obfuscated).{0,30}(payload|trigger|key|secret|activation)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0043.004
      name: Insert Backdoor Trigger
      url: https://atlas.mitre.org/techniques/AML.T0043.004
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Validate AI models for backdoor triggers using adversarial testing
    and concept drift monitoring. (2) Preprocess all inference data to strip adversarial
    perturbations and invisible characters. (3) Implement input validation and adversarial
    detection algorithms prior to model inference. (4) Use ensemble methods and model
    hardening techniques to increase robustness against trigger-based attacks.
  references:
  - https://atlas.mitre.org/techniques/AML.T0043.004
  tags:
  - backdoor
  - trigger-injection
  - static
  - model-hardening
  - adversarial-input
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-104
  name: Uncontrolled MCP Tool Activation Triggers
  status: experimental
  severity: HIGH
  category: trigger-control
  detection_type: static
  description: MCP tool definitions may declare automatic activation triggers or event
    listeners that execute without explicit user confirmation. Adversaries can exploit
    overly broad or undocumented triggers to initiate unintended agent workflows,
    potentially leading to data exfiltration or unauthorized system actions.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Automatic or event-driven activation language
      expression: (auto|trigger|activate|listen).{0,40}(when|on|upon|event|keyword|email|message)
      flags:
      - IGNORECASE
    - type: regex
      description: Unrestricted background or webhook execution hints
      expression: (background|continuous|polling|webhook|callback).{0,40}(execute|run|invoke|process|fetch)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0084.002
      name: Activation Triggers
      url: https://atlas.mitre.org/techniques/AML.T0084.002
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Explicitly define and constrain trigger conditions in tool annotations.
    (2) Require explicit user confirmation for event-driven tool execution. (3) Audit
    tool descriptions for automatic activation claims and remove undocumented triggers.
    (4) Implement allowlists for permitted trigger sources.
  references:
  - https://atlas.mitre.org/techniques/AML.T0084.002
  tags:
  - activation-triggers
  - event-driven
  - static
  - agent-control
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-105
  name: Adversarial AI Attack Vector Detection
  status: experimental
  severity: HIGH
  category: model-integrity
  detection_type: static
  description: MCP tool definitions may be crafted to function as adversarial attack
    vectors against downstream AI models. This rule detects metadata referencing evasion
    techniques, bypass strings, or backdoor triggers that could compromise model robustness.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: References to adversarial attack methods or evasion techniques
      expression: (adversarial|bypass|evasion|backdoor|neural.payload|fgsm|pgd).{0,50}(attack|trigger|string|payload|model)
      flags:
      - IGNORECASE
    - type: regex
      description: Claims of circumventing safety filters or AI detectors
      expression: (bypass|evade|circumvent).{0,40}(safety|filter|detector|guardrail|moderation)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
