    - type: regex
      description: References to uncensored or jailbroken AI models
      expression: (uncensored|jailbreak|unfiltered|guardrail.bypass|alignment.remove).{0,40}(model|llm|ai|generator)
      flags:
      - IGNORECASE
    - type: regex
      description: Integration with local AI serving frameworks or untrusted repositories
      expression: (ollama|vllm|hf\.co|huggingface).{0,40}(uncensored|offensive|deepfake|malicious|bypass)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0016.002
      name: Generative AI
      url: https://atlas.mitre.org/techniques/AML.T0016.002
    owasp-llm:
      id: LLM04
      name: Improper AI Model Lifecycle Management
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Audit tool descriptions and server URLs for references to uncensored
    or jailbroken models. (2) Enforce allowlists for approved AI providers and model
    repositories. (3) Implement input validation and safety guardrails on all AI-related
    tool parameters. (4) Disable local model serving unless explicitly required and
    hardened.
  references:
  - https://atlas.mitre.org/techniques/AML.T0016.002
  tags:
  - generative-ai
  - uncensored-models
  - ai-integration
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-128
  name: Prompt Obfuscation via Encoding and Hidden Characters
  status: experimental
  severity: HIGH
  category: defense-evasion
  detection_type: static
  description: Adversaries obfuscate malicious instructions within MCP tool definitions
    or resource metadata to bypass LLM guardrails and human review. This includes
    using encoding schemes like base64, embedding invisible Unicode characters, or
    leveraging visual obfuscation techniques in text fields.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects encoding schemes or obfuscation keywords used to hide instructions
      expression: (base64|rot13|encoded|cipher|obfuscated).{0,30}(string|data|payload|instruction|command)
      flags:
      - IGNORECASE
    - type: unicode
      description: Detects zero-width or invisible Unicode characters used to conceal
        payloads
  mappings:
    mitre-atlas:
      id: AML.T0068
      name: LLM Prompt Obfuscation
      url: https://atlas.mitre.org/techniques/AML.T0068
    owasp-llm:
      id: LLM02
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Strip or decode encoded strings before processing. (2) Sanitize
    inputs to remove zero-width and invisible Unicode characters. (3) Enforce strict
    schema validation on tool descriptions and parameters. (4) Implement runtime guardrails
    that decode and scan obfuscated content.
  references:
  - https://atlas.mitre.org/techniques/AML.T0068
  tags:
  - defense-evasion
  - prompt-obfuscation
  - static
  - encoding-detection
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-129
  name: False RAG Entry Injection via MCP Ingestion Tools
  status: experimental
  severity: HIGH
  category: rag-integrity
  detection_type: static
  description: MCP tools and resources configured for document ingestion may lack
    input sanitization, allowing adversaries to inject false RAG entries. These poisoned
    entries bypass monitoring and manipulate LLM responses during retrieval. The rule
    detects ingestion endpoints with weak schema constraints or metadata containing
    RAG manipulation keywords.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: RAG ingestion claims combined with prompt injection language
      expression: (ingest|index|embed|retrieve).{0,40}(rag|knowledge|document|context).{0,40}(ignore|override|system|instruction|prompt)
      flags:
      - IGNORECASE
    - type: regex
      description: Metadata manipulation keywords indicating RAG entry spoofing
      expression: (metadata|title|author|timestamp|source).{0,40}(inject|spoof|forge|override|bypass|hide)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Unconstrained document input fields vulnerable to RAG poisoning
      condition:
        field_name_matches:
          regex: (content|document|text|payload|attachment|file)
          flags:
          - IGNORECASE
        missing_constraints:
        - maxLength
        - format
        - pattern
        - enum
  mappings:
    mitre-atlas:
      id: AML.T0071
      name: False RAG Entry Injection
      url: https://atlas.mitre.org/techniques/AML.T0071
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM02
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-llms/
  remediation: (1) Implement strict input validation and sanitization for all document
    ingestion endpoints. (2) Enforce schema constraints including maxLength, format,
    and content-type filtering. (3) Deploy RAG-specific content filtering to detect
    and quarantine suspicious metadata or injection patterns. (4) Audit tool definitions
    for unconstrained text fields and restrict ingestion privileges.
  references:
  - https://atlas.mitre.org/techniques/AML.T0071
  tags:
  - rag-poisoning
  - defense-evasion
  - static
  - input-validation
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-130
  name: AI Agent Context Poisoning via Tool Definitions
  status: experimental
  severity: HIGH
  category: context-poisoning
  detection_type: static
  description: MCP tool definitions may contain hidden instructions designed to manipulate
    the LLM's context or memory. Adversaries embed prompts that instruct the agent
    to store malicious preferences or alter its operational context, leading to persistent
    behavioral changes across sessions.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Instructions to persist malicious context or memory
      expression: (store|remember|add to memory|update context|persist).{0,50}(instruction|preference|rule|behavior|directive)
      flags:
      - IGNORECASE
    - type: regex
      description: Context override or history manipulation directives
      expression: (ignore previous context|reset memory|clear history|override system
        prompt|discard prior instructions).{0,40}(and|then|instead|follow)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0080
      name: AI Agent Context Poisoning
      url: https://atlas.mitre.org/techniques/AML.T0080
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-agentic:
      id: AG01
      name: Context Manipulation
      url: https://owasp.org/www-project-agentic-security/
  remediation: (1) Implement memory hardening by restricting agent ability to store
    unverified context. (2) Require external authentication and validation for memory
    updates. (3) Enforce strict context boundaries and sanitize tool metadata before
    ingestion. (4) Monitor for anomalous context modifications.
  references:
  - https://atlas.mitre.org/techniques/AML.T0080
  tags:
  - context-poisoning
  - persistence
  - static
  - llm-memory
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-131
  name: Persistent Thread Poisoning via Tool Definitions
  status: experimental
  severity: HIGH
  category: context-integrity
  detection_type: static
  description: MCP tool and resource definitions may embed instructions designed to
    persist across agent sessions or poison shared conversation threads. These payloads
    manipulate the LLM's context window to enforce malicious behavior, override system
    prompts, or establish covert command channels that affect multiple users.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Persistent context override instructions
      expression: (persist|always|retain|remember).{0,40}(context|memory|instructions|system|prompt)
      flags:
      - IGNORECASE
    - type: regex
      description: Shared thread or multi-user poisoning vectors
      expression: (shared|broadcast|thread|channel).{0,40}(inject|poison|override|command|execute)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0080.001
      name: Thread
      url: https://atlas.mitre.org/techniques/AML.T0080.001
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-large-language-model-applications/
  remediation: (1) Sanitize all tool descriptions and annotations to remove persistent
    instruction language. (2) Enforce strict input validation and length limits on
    tool parameters. (3) Isolate agent contexts per user/session to prevent cross-thread
    contamination. (4) Audit server definitions for indirect injection vectors.
  references:
  - https://atlas.mitre.org/techniques/AML.T0080.001
  tags:
  - thread-poisoning
  - prompt-injection
  - context-persistence
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
