  updated: '2026-05-22'
- id: MCPS-081
  name: Adversarial Data Crafting via Tool Definitions
  status: experimental
  severity: HIGH
  category: input-validation
  detection_type: static
  description: MCP tool definitions may contain adversarial payloads or lack input
    validation, enabling attackers to craft data that evades model safety filters
    or triggers unintended behaviors. This technique targets the staging phase where
    malicious inputs are embedded in tool metadata or schemas before execution.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: tool.annotations
  detection:
