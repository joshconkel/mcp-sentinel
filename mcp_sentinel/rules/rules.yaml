  updated: '2026-05-22'
- id: MCPS-140
  name: Agentic Resource Consumption via Tool Directives
  status: experimental
  severity: MEDIUM
  category: resource-abuse
  detection_type: static
  description: MCP tool definitions may contain embedded directives that coerce AI
    agents into performing computationally expensive operations, excessive API calls,
    or recursive self-delegation loops. These patterns waste infrastructure resources,
    exhaust API budgets, and can lead to system stalls or denial of service.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Detects directives forcing excessive repetition or broad data fetching
      expression: (summarize|translate|process|fetch|look up).{0,60}(all|every|1000|repeatedly|multiple
        times|instead of local|internet)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects recursive or self-delegation instructions causing loops
      expression: (call.{0,20}self|recursive|delegate.{0,20}itself|loop.{0,20}until|repeat.{0,20}indefinitely|self-delegation)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0034.002
      name: Agentic Resource Consumption
      url: https://atlas.mitre.org/techniques/AML.T0034.002
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Audit tool descriptions and annotations for directives encouraging
    excessive repetition, broad data fetching, or recursive calls. (2) Implement rate
    limiting and cost caps on agent tool invocations. (3) Enforce strict input validation
    and sandboxing to prevent self-delegation loops.
  references:
  - https://atlas.mitre.org/techniques/AML.T0034.002
  tags:
  - resource-abuse
  - denial-of-service
  - agent-exploitation
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-141
  name: Persistent Memory Manipulation via MCP Tools
  status: experimental
  severity: HIGH
  category: memory-integrity
  detection_type: static
  description: MCP server definitions may expose tools or configurations that allow
    untrusted data to be written directly to persistent memory or context stores.
    Adversaries exploit these pathways to inject malicious instructions or false facts
    that persist across sessions, effectively poisoning the LLM's long-term memory
    and altering future agent behavior.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects tool descriptions indicating unvalidated memory or context
        persistence
      expression: (store|save|write|persist|remember|cache).{0,50}(memory|context|preference|fact|note|state)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Identifies input schemas for memory-writing tools lacking type
        constraints or validation
      condition:
        field_name_matches:
          regex: (memory|context|preference|note|state|cache)
          flags:
          - IGNORECASE
        field_type: string
        missing_constraints:
        - maxLength
        - pattern
        - enum
    - type: value_check
      description: Flags server configurations enabling untrusted external data flow
        into memory stores
      condition:
        value_in:
        - 'true'
        - enabled
        - allow
        - untrusted
        missing_fields:
        - auth_required
        - validation_enabled
        matches_unpinned: true
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0080.000
      name: Memory
      url: https://atlas.mitre.org/techniques/AML.T0080.000
    owasp-llm:
      id: LLM02
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-llm-applications/
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Implement memory hardening by enforcing strict trust boundaries
    for all context storage. (2) Require explicit user authentication and validation
    before persisting any memory or preference. (3) Sanitize and validate all inputs
    destined for memory stores using schema constraints. (4) Audit tool definitions
    to restrict unrestricted write access to persistent context.
  references:
  - https://atlas.mitre.org/techniques/AML.T0080.000
  tags:
  - memory-poisoning
  - context-persistence
  - static
  - llm-security
  added: '2026-05-22'
  updated: '2026-05-22'
