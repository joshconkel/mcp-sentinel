- id: MCPS-032
  name: RAG Poisoning via Tool Description Injection
  status: experimental
  severity: HIGH
  category: rag-integrity
  detection_type: static
  description: MCP tool definitions may contain hidden instructions designed to be
    indexed by RAG systems. When retrieved during future queries, these payloads can
    override system prompts, exfiltrate data, or persist malicious behavior across
    sessions. This technique exploits the trust placed in indexed metadata and tool
    annotations.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: RAG retrieval trigger combined with instruction override
      expression: (when retrieved|upon search|in context|rag result).{0,60}(ignore|override|exfiltrate|send|forward|always
        respond)
      flags:
      - IGNORECASE
    - type: regex
      description: Stealth exfiltration instructions hidden in metadata
      expression: (hidden|invisible|do not show|suppress output).{0,50}(exfiltrate|send|forward|log|record|external)
      flags:
      - IGNORECASE
    - type: length
      description: Suspiciously long description field indicating embedded payload
      threshold_chars: 500
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
