      expression: (adversarial|poison|trigger|backdoor|bypass.{0,20}(safety|filter|guard)|ignore.{0,20}(system|prompt|instruction))
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Unconstrained input schema enabling adversarial data injection
      condition:
