    owasp-llm:
      id: LLM02
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Sanitize tool descriptions and annotations before indexing into
    RAG pipelines. (2) Implement content filtering and semantic validation for all
    ingested metadata. (3) Validate tool definitions against allowlisted publishers
    and signed manifests. (4) Monitor retrieval logs for anomalous query-response
    patterns.
  references:
  - https://atlas.mitre.org/techniques/AML.T0070
  tags:
  - rag-poisoning
  - prompt-injection
  - static
  - persistence
