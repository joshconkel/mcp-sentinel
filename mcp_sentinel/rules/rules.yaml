- id: MCPS-138
  name: AI Agent Configuration Tampering Detection
  status: experimental
  severity: HIGH
  category: configuration-integrity
  detection_type: static
  description: Adversaries modify MCP server definitions to alter AI agent configurations,
    system prompts, or security guardrails. These changes persist across sessions
    and can disable safety controls, redirect tool calls to malicious endpoints, or
    embed covert instructions for data exfiltration.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.url
  - field: server.transport
  detection:
