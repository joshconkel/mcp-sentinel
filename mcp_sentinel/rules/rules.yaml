- id: MCPS-139
  name: Exposed AI Agent Configuration and Secrets
  status: experimental
  severity: HIGH
  category: configuration-exposure
  detection_type: static
  description: MCP server definition files may inadvertently expose sensitive configuration
    details, hardcoded credentials, or dynamic loading mechanisms. If these files
    are publicly accessible or leaked, adversaries can map agent capabilities, harvest
    secrets, or inject malicious system prompts to hijack agent behavior.
  targets:
  - field: server.env.*
  - field: tool.description
  - field: tool.annotations
  - field: server.transport
  detection:
    patterns:
    - type: regex
      description: Hardcoded credentials or secrets in configuration fields
      expression: (password|secret|api_key|token|credential|auth).{0,15}[:=][ \t]*['"]?[a-zA-Z0-9_\-]{8,}
      flags:
      - IGNORECASE
    - type: regex
      description: Dynamic configuration loading or external prompt references
      expression: (fetch|load|import|include|read).{0,20}(config|prompt|system|instruction|workflow).{0,15}(http|file|url|remote)
      flags:
      - IGNORECASE
    - type: value_check
      description: Missing authentication or transport security constraints
      condition:
        missing_fields:
        - server.auth
        - server.transport.tls
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
