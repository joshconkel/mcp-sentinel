    nist-ai-rmf:
      id: PR.AN-03
      name: Adversarial Machine Learning
      url: https://www.nist.gov/ai-rmf
  remediation: (1) Validate AI models for backdoor triggers and adversarial influence.
    (2) Implement model hardening via adversarial training or network distillation.
    (3) Restrict the number and rate of AI model queries. (4) Use ensemble methods
    to increase robustness against adversarial inputs. (5) Apply passive AI output
    obfuscation to reduce information leakage.
  references:
  - https://atlas.mitre.org/techniques/AML.T0043
  tags:
