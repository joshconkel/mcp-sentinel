- id: MCPS-035
  name: Deferred Malicious Instructions in Tool Definitions
  status: experimental
  severity: HIGH
  category: defense-evasion
  detection_type: static
  description: MCP tool definitions may contain conditional or deferred instructions
    designed to trigger only after a specific future event or conversation turn. This
    technique bypasses turn-based security controls that restrict tool invocation
    or data access when untrusted data first enters context.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Conditional triggers for future conversation turns or requests
      expression: (if|when|after|upon|on).{0,50}(next|future|later|subsequent|new).{0,40}(request|turn|interaction|prompt|message)
      flags:
      - IGNORECASE
    - type: regex
      description: Explicit instruction deferral combined with tool or data access
        actions
      expression: (delay|defer|wait|hold|postpone).{0,40}(execution|invoke|call|run|access|exfiltrate|retrieve)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0094
      name: Delay Execution of LLM Instructions
      url: https://atlas.mitre.org/techniques/AML.T0094
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-llms/
  remediation: (1) Sanitize tool descriptions and annotations to remove conditional
    or deferred instruction patterns. (2) Implement turn-aware execution policies
    that inspect context history before allowing tool invocation. (3) Deploy static
    analysis scanning for temporal trigger keywords in MCP definitions.
  references:
  - https://atlas.mitre.org/techniques/AML.T0094
  tags:
  - defense-evasion
  - delayed-execution
  - static
  - prompt-injection
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-036
  name: Supply Chain Rug Pull via Package Update
  status: experimental
  severity: HIGH
  category: supply-chain
  detection_type: static
  description: Adversaries publish legitimate MCP server packages or dependencies,
    gain user trust, and later push malicious updates that compromise agent behavior
    or exfiltrate data. Static analysis can detect missing integrity checks, unpinned
    versions, or suspicious registry endpoints that facilitate undetected supply chain
    compromises.
  targets:
  - field: server.packages[]
  - field: server.url
  detection:
    patterns:
    - type: value_check
      description: Missing cryptographic integrity verification for server packages
      condition:
        missing_fields:
        - integrity
        - checksum
        - signature
    - type: regex
      description: Suspicious package registry or update endpoint URLs
      expression: (registry|update|mirror|cdn).{0,30}(exfil|c2|payload|drop|inject|malware)
      flags:
      - IGNORECASE
    - type: value_check
      description: Unpinned package versions allowing arbitrary updates
      condition:
        matches_unpinned: true
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0109
      name: AI Supply Chain Rug Pull
      url: https://atlas.mitre.org/techniques/AML.T0109
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Enforce strict version pinning for all MCP server dependencies.
    (2) Require cryptographic signatures or integrity hashes for package updates.
    (3) Validate package sources against official registries. (4) Implement automated
    monitoring for unexpected package changes or metadata anomalies.
  references:
  - https://atlas.mitre.org/techniques/AML.T0109
  tags:
  - supply-chain
  - rug-pull
  - package-integrity
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-037
  name: Public Code Repository Exposure in MCP Definitions
  status: experimental
  severity: MEDIUM
  category: reconnaissance
  detection_type: static
  description: MCP server and tool definitions may inadvertently expose references
    to public code repositories, revealing victim infrastructure, AI frameworks, or
    internal project structures. Adversaries leverage these references for reconnaissance
    to map target environments, discover AI agent configurations, or identify leaked
    credentials and API keys.
