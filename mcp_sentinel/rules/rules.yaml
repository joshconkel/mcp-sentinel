    checksums. (2) Validate tool descriptions and input schemas against a strict allowlist
    of approved publishers. (3) Scan definitions for hidden instructions, invisible
    Unicode, and suspicious remote endpoints before deployment. (4) Implement runtime
    sandboxing for agent tool invocations to prevent arbitrary command execution.
  references:
  - https://atlas.mitre.org/techniques/AML.T0011.002
  tags:
  - supply-chain
  - tool-poisoning
