  updated: '2026-05-22'
- id: MCPS-106
  name: Compromised Model Loading via Untrusted Dependencies
  status: experimental
  severity: HIGH
  category: model-supply-chain
  detection_type: static
  description: MCP server definitions may reference external AI models or packages
    for inference and fine-tuning. Adversaries compromise these model artifacts with
    backdoors or malicious code, which execute when the server loads them. This rule
    detects unversioned references and missing integrity constraints in model dependencies.
  targets:
  - field: server.packages[]
  - field: server.url
  detection:
    patterns:
    - type: value_check
      description: Unpinned model or package references
      condition:
        matches_unpinned: true
    - type: regex
      description: External model loading or fine-tuning directives
      expression: (load|download|fine.?tune|import).{0,50}(model|weights|checkpoint|hub)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Missing cryptographic integrity constraints
      condition:
        missing_constraints:
        - checksum
        - signature
        - hash
  mappings:
    mitre-atlas:
      id: AML.T0010.003
      name: Model
      url: https://atlas.mitre.org/techniques/AML.T0010.003
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
    nist-ai-rmf:
      id: RMF-1.1
      name: Model Provenance and Integrity
      url: https://csrc.nist.gov/pubs/ai-rmf/1.0
  remediation: (1) Enforce cryptographic signing and verification for all model artifacts
    and dependencies. (2) Pin exact versions and checksums for all external model
    references. (3) Validate models in isolated sandboxes before loading into production
    MCP servers. (4) Restrict model loading to approved internal registries.
  references:
  - https://atlas.mitre.org/techniques/AML.T0010.003
  tags:
  - model-supply-chain
  - dependency-verification
  - static
  - integrity
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-107
  name: Indirect AI Model Access via Third-Party Service
  status: experimental
  severity: HIGH
  category: ai-model-access
  detection_type: static
  description: MCP tool and server definitions may integrate external AI-enabled products
    or services that expose underlying model inference endpoints. Without proper isolation,
    telemetry, or input validation, these integrations can leak model details, enable
    indirect model access, or facilitate evasion attacks against AI security controls.
  targets:
  - field: tool.description
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: References to external AI inference services or model endpoints
      expression: (ai|ml|neural|model).{0,40}(endpoint|service|backend|inference|api|gateway)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: AI-enabled tools missing input validation or telemetry constraints
      condition:
        field_name_matches:
          regex: (ai|ml|model|inference)
          flags:
          - IGNORECASE
        field_type: object
        missing_constraints:
        - telemetry_logging
        - input_validation
        - rate_limiting
  mappings:
    mitre-atlas:
      id: AML.T0047
      name: AI-Enabled Product or Service
      url: https://atlas.mitre.org/techniques/AML.T0047
    owasp-llm:
      id: LLM08
      name: Model Theft
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    nist-ai-rmf:
      id: PR.AIML-3
      name: AI Model Protection
      url: https://www.nist.gov/ai-risk-management-framework
  remediation: (1) Implement comprehensive AI telemetry logging for all model inputs,
    outputs, and intermediate agentic steps. (2) Enforce strict input validation and
    rate limiting on tools interacting with external AI services. (3) Isolate third-party
    AI integrations using sandboxed execution environments. (4) Audit and verify the
    security posture of all AI-enabled dependencies before deployment.
  references:
  - https://atlas.mitre.org/techniques/AML.T0047
  tags:
  - ai-model-access
  - telemetry
  - third-party-ai
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-108
  name: MCP Artifact Masquerading via Metadata Spoofing
  status: experimental
  severity: HIGH
  category: defense-evasion
  detection_type: static
  description: Adversaries manipulate MCP tool names, descriptions, or server URLs
    to impersonate legitimate utilities, trusted vendors, or official services. This
    masquerading technique aims to bypass security controls and trick AI agents or
    users into invoking malicious components under the guise of benign functionality.
  targets:
  - field: tool.name
  - field: tool.description
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Claims of legitimacy or official status in metadata
      expression: (official|verified|trusted|authentic|legitimate).{0,30}(tool|server|skill|plugin|extension|service)
      flags:
      - IGNORECASE
    - type: regex
      description: Impersonation of system or administrative utilities
      expression: (system|admin|root|sudo|shell|terminal|cmd|powershell|debug).{0,30}(tool|command|exec|run|utility|helper)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0074
      name: Masquerading
      url: https://atlas.mitre.org/techniques/AML.T0074
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Verify tool and server names against a trusted allowlist. (2) Cross-reference
    publisher metadata with known-good registries. (3) Implement strict naming conventions
    and reject claims of unofficial legitimacy. (4) Audit server URLs for typosquatting
    or look-alike domains.
  references:
  - https://atlas.mitre.org/techniques/AML.T0074
  tags:
  - masquerading
  - defense-evasion
  - metadata-spoofing
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-109
  name: Model Manipulation and Weight Poisoning Detection
  status: experimental
  severity: CRITICAL
  category: model-integrity
  detection_type: static
  description: MCP server definitions may reference compromised AI models, poisoned
    weights, or modified architectures that persist malicious behavior. Adversaries
    exploit unvalidated model sources to embed backdoors or alter inference logic
    without detection. This technique covers weight poisoning, architecture modification,
    and embedded malware within model artifacts.
  targets:
  - field: server.packages[]
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects references to untrusted model weights or architecture overrides
      expression: (weights|checkpoint|fine.?tune|architecture|model.?config).{0,50}(override|inject|poison|malicious|backdoor|custom.?weights)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects embedded executable payloads or dynamic code loading in
        definitions
      expression: (eval|exec|import|require|fetch).{0,40}(model|weights|payload|malware|shellcode|remote.?code)
      flags:
      - IGNORECASE
    - type: value_check
      description: Flags missing model integrity validation constraints
      condition:
        missing_fields:
        - model_validation
        - integrity_check
        - signature_verification
      severity_override: HIGH
  mappings:
    mitre-atlas:
      id: AML.T0018
      name: Manipulate AI Model
      url: https://atlas.mitre.org/techniques/AML.T0018
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
    owasp-llm:
      id: LLM06
      name: Supply Chain Vulnerabilities
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Enforce cryptographic signing and verification of all model artifacts
    and weights. (2) Validate model integrity against known-good baselines before
    deployment. (3) Restrict access to model registries and training data to authorized
    personnel only. (4) Monitor for concept drift and anomalous inference patterns
    indicating poisoning.
  references:
  - https://atlas.mitre.org/techniques/AML.T0018
  tags:
  - model-poisoning
  - supply-chain
  - static
  - persistence
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-110
  name: Adversarial AI Library Dependency Detection
  status: experimental
  severity: HIGH
  category: supply-chain-security
  detection_type: static
  description: MCP server definitions may declare dependencies on open-source adversarial
    AI attack frameworks. These libraries, originally intended for research, can be
    weaponized to generate evasion examples, poison training data, or bypass model
    safeguards within the agent's execution environment.
  targets:
  - field: server.packages[]
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Detects known adversarial AI research libraries in dependencies
        or metadata
      expression: (cleverhans|adversarial.?robustness.?toolbox|foolbox|art|adversarial.?ai|advbench|textattack|autoattack)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies references to adversarial attack methodologies in tool
        definitions
      expression: (adversarial|poisoning|evasion|perturbation).{0,40}(attack|tool|framework|library|dataset)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0016.000
      name: Adversarial AI Attack Implementations
      url: https://atlas.mitre.org/techniques/AML.T0016.000
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Audit server dependencies for research-only adversarial AI libraries.
    (2) Replace with production-hardened alternatives or remove if unnecessary. (3)
    Implement strict allowlisting for third-party packages. (4) Scan tool descriptions
    for unauthorized attack terminology.
  references:
  - https://atlas.mitre.org/techniques/AML.T0016.000
  tags:
  - adversarial-ai
  - supply-chain
  - static
  - dependency-audit
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-111
  name: Repurposed Software Tools for AI Attacks
  status: experimental
  severity: HIGH
  category: tool-integrity
  detection_type: static
  description: Adversaries repurpose or modify legitimate software tools to attack
    AI systems, such as creating reverse proxies for LLM access or injecting deepfakes
    to bypass biometric verification. This rule detects MCP tool definitions that
    indicate malicious repurposing, unauthorized access capabilities, or biometric
    evasion techniques.
  targets:
  - field: tool.description
  - field: tool.name
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Identifies tools repurposed for unauthorized access or data exfiltration
      expression: (reverse.proxy|credential.harvest|unauthorized.access|data.exfiltration).{0,50}(tool|service|proxy|access)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects references to deepfake generation or biometric evasion
      expression: (deepfake|face.swap|biometric.evasion|camera.hijack|liveness.bypass).{0,50}(injection|authentication|verification)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0016.001
      name: Software Tools
      url: https://atlas.mitre.org/techniques/AML.T0016.001
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Audit all third-party MCP tools for unauthorized modifications.
    (2) Enforce strict input validation and schema constraints. (3) Monitor tool behavior
    for reverse proxy or data exfiltration patterns. (4) Verify tool signatures against
    trusted registries.
  references:
  - https://atlas.mitre.org/techniques/AML.T0016.001
  tags:
  - repurposed-tools
  - ai-attack
  - static
  - supply-chain
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-112
  name: Adversarial Input Crafting via Unconstrained Tool Schemas
  status: experimental
  severity: HIGH
  category: input-validation
  detection_type: static
  description: MCP tool definitions that lack strict input constraints allow adversaries
    to manually modify and craft adversarial inputs. By exploiting overly permissive
    schemas, attackers can iteratively tweak parameters to bypass model safeguards
    or trigger unintended behaviors.
  targets:
  - field: tool.inputSchema
  - field: tool.description
  detection:
    patterns:
    - type: regex
      description: Bypass strings or adversarial markers in tool metadata
      expression: (bypass|adversarial|perturbation|universal.bypass).{0,40}(input|prompt|query)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Unconstrained string parameters vulnerable to manual modification
      condition:
        field_type: string
        missing_constraints:
        - maxLength
        - pattern
        - format
    - type: value_check
      description: Missing input sanitization or validation directives
      condition:
        missing_fields:
        - inputValidation
        - sanitize
        - adversarialFilter
  mappings:
    mitre-atlas:
      id: AML.T0043.003
      name: Manual Modification
      url: https://atlas.mitre.org/techniques/AML.T0043.003
    owasp-mcp:
      id: MCP04
      name: Insecure Input Validation
      url: https://owasp.org/www-project-mcp-top-10/#mcp04
  remediation: (1) Implement input restoration and sanitization pipelines to nullify
    adversarial perturbations. (2) Apply model hardening techniques such as adversarial
    training or ensemble methods. (3) Restrict query rates and enforce strict schema
    validation with maxLength and pattern constraints. (4) Deploy adversarial input
    detection algorithms to block atypical queries.
  references:
  - https://atlas.mitre.org/techniques/AML.T0043.003
  tags:
  - adversarial-input
  - manual-modification
  - input-validation
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-113
  name: Exposure of AI Model Outputs in MCP Definitions
  status: experimental
  severity: MEDIUM
  category: information-disclosure
  detection_type: static
  description: MCP server and tool definitions may inadvertently expose internal AI
    model outputs, confidence scores, or debug flags. These artifacts enable adversaries
    to reverse-engineer model decision boundaries and craft evasion attacks. Static
    analysis detects verbose logging configurations and explicit references to raw
    model scoring in metadata.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.env.*
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: References to model confidence scores or probabilities in tool
        metadata
      expression: (confidence|probability|score|threshold|raw.?output).{0,40}(log|expose|return|display|enable)
      flags:
      - IGNORECASE
    - type: regex
      description: Debug or verbose logging flags exposing inference details
      expression: (debug|verbose|trace|log.?level).{0,30}(model|ai|llm|inference|scoring)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0063
      name: Discover AI Model Outputs
      url: https://atlas.mitre.org/techniques/AML.T0063
    owasp-mcp:
      id: MCP06
      name: Sensitive Data Exposure
      url: https://owasp.org/www-project-mcp-top-10/#mcp06
  remediation: (1) Apply passive AI output obfuscation to strip confidence scores
    and raw probabilities from tool responses. (2) Encrypt sensitive model metadata
    and restrict debug or verbose logging in production environments. (3) Enforce
    strict access controls and authentication for all API endpoints and model queries.
    (4) Deploy models in centralized cloud environments rather than edge devices to
    limit adversary access to internal outputs.
  references:
  - https://atlas.mitre.org/techniques/AML.T0063
  tags:
  - discovery
  - information-disclosure
  - model-outputs
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-114
  name: RAG Data Source Enumeration via MCP Definitions
  status: experimental
  severity: MEDIUM
  category: reconnaissance
  detection_type: static
  description: MCP server definitions may inadvertently expose references to retrieval
    augmented generation (RAG) pipelines, vector stores, or external data ingestion
    sources. Adversaries analyze these definitions to identify and target the underlying
    data repositories for poisoning or manipulation.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: References to RAG pipelines or vector stores
      expression: (rag|vector.store|knowledge.base|index|embed).{0,40}(source|data|repository|document|email|file|ingest)
      flags:
      - IGNORECASE
    - type: regex
      description: External or untrusted data ingestion references
      expression: (crawl|scrape|fetch|pull|sync|ingest).{0,40}(external|third.party|untrusted|public|internet|web)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0064
      name: Gather RAG-Indexed Targets
      url: https://atlas.mitre.org/techniques/AML.T0064
    owasp-llm:
      id: LLM06
      name: Training Data Poisoning
      url: https://owasp.org/www-project-top-10-llm-applications/
  remediation: (1) Remove explicit references to RAG pipelines or data sources from
    tool descriptions. (2) Abstract data ingestion details in server configurations.
    (3) Implement strict access controls on vector stores and knowledge bases. (4)
    Audit MCP definitions for unintended data exposure.
  references:
  - https://atlas.mitre.org/techniques/AML.T0064
  tags:
  - reconnaissance
  - rag
  - data-exposure
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-115
  name: Data Exfiltration via External Endpoints
  status: experimental
  severity: HIGH
  category: data-exfiltration
  detection_type: static
  description: MCP server and tool definitions may be configured to route sensitive
    AI artifacts, conversation context, or model outputs to untrusted external endpoints.
    This pattern detects configurations that facilitate unauthorized data transmission
    or exfiltration via traditional cyber means.
  targets:
  - field: tool.description
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects exfiltration-related verbs and data references in tool
        descriptions or server URLs
      expression: (exfiltrate|upload|send|forward|transmit|leak|ship).{0,60}(data|output|context|results|files|credentials|secrets)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies connections to known external data storage or transfer
        services
      expression: (s3://|ftp://|upload\.|transfer\.|pastebin|dropbox|mega\.nz|file\.io)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0025
      name: Exfiltration via Cyber Means
      url: https://atlas.mitre.org/techniques/AML.T0025
    owasp-mcp:
      id: MCP06
      name: Insecure Data Handling
      url: https://owasp.org/www-project-mcp-top-10/#mcp06
  remediation: (1) Establish strict access controls on internal model registries and
    limit production model access to approved users. (2) Validate and allowlist all
    external server URLs and data endpoints. (3) Enforce schema constraints on tool
    outputs to prevent arbitrary data transmission. (4) Monitor network traffic for
    unauthorized data transfers.
  references:
  - https://atlas.mitre.org/techniques/AML.T0025
  tags:
  - exfiltration
  - data-leak
  - external-endpoints
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-116
  name: AI Artifact Collection via MCP Exposure
  status: experimental
  severity: HIGH
  category: artifact-exposure
  detection_type: static
  description: MCP servers may inadvertently expose tools or resources that aggregate,
    download, or reference sensitive AI artifacts such as model checkpoints, training
    datasets, or internal telemetry. Adversaries can leverage these exposed endpoints
    to collect artifacts for exfiltration or offline model analysis. Static analysis
    identifies references to artifact storage and unrestricted data export capabilities.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.url
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: References to model weights, checkpoints, or datasets with download
        or export verbs
      expression: (checkpoint|weights|model\.bin|dataset|training\.data).{0,40}(download|export|fetch|access|path|retrieve)
      flags:
      - IGNORECASE
    - type: regex
      description: Telemetry or internal data aggregation endpoints
      expression: (telemetry|metrics|audit|internal\.log).{0,40}(collect|aggregate|scrape|bulk|export)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0035
      name: AI Artifact Collection
      url: https://atlas.mitre.org/techniques/AML.T0035
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Limit public release of model checkpoints and training datasets.
    (2) Enforce strict access controls and encryption on artifact storage endpoints.
    (3) Prefer cloud-hosted model serving over edge deployment to reduce exposure.
    (4) Validate and restrict tool capabilities that aggregate or export internal
    telemetry.
  references:
  - https://atlas.mitre.org/techniques/AML.T0035
  tags:
  - artifact-collection
  - data-exposure
  - static
  - model-security
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-117
  name: Exposure of Public AI Artifacts in MCP Definitions
  status: experimental
  severity: MEDIUM
  category: information-disclosure
  detection_type: static
  description: MCP server definitions may inadvertently reference or expose public
    AI artifacts such as model weights, training datasets, or agent configurations.
    Adversaries can harvest these references to reconstruct the victim's AI stack,
    create proxy models, or craft targeted adversarial inputs.
  targets:
  - field: tool.description
  - field: server.packages[]
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: References to public AI model or dataset repositories
      expression: (huggingface|github|openml|kaggle|s3|bucket)\.com/.{0,30}(model|dataset|weights|checkpoint|config)
      flags:
      - IGNORECASE
    - type: regex
      description: Mentions of sensitive AI stack components in public metadata
      expression: (training.data|model.weights|agent.config|system.prompt|hyperparameters).{0,30}(public|open|shared|repository|exposed)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0002
      name: Acquire Public AI Artifacts
      url: https://atlas.mitre.org/techniques/AML.T0002
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Limit public release of technical information about the AI stack.
    (2) Restrict access to model repositories and datasets using authentication and
    authorization. (3) Remove references to training data, model weights, or agent
    configurations from public-facing tool descriptions. (4) Monitor access logs for
    unauthorized artifact retrieval.
  references:
  - https://atlas.mitre.org/techniques/AML.T0002
  tags:
  - information-disclosure
  - ai-artifacts
  - static
  - resource-development
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-118
  name: White-Box Model Access and Input Exposure
  status: experimental
  severity: HIGH
  category: model-access-control
  detection_type: static
  description: White-box optimization attacks require direct access to model internals,
    gradients, or unfiltered input channels. This rule detects MCP tool or server
    definitions that expose model architecture, lack input validation constraints,
    or claim direct/raw model access, creating conditions for adversarial example
    generation.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Claims of direct model access or internal parameter exposure
      expression: (expose|direct|raw|unfiltered|bypass).{0,40}(model|weights|gradients|parameters|internals|architecture)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Input schema missing validation constraints to block adversarial
        perturbations
      condition:
        field_name_matches:
          regex: inputSchema
          flags:
          - IGNORECASE
        field_type: object
        missing_constraints:
        - maxLength
        - pattern
        - format
        - minLength
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0043.000
      name: White-Box Optimization
      url: https://atlas.mitre.org/techniques/AML.T0043.000
    owasp-llm:
      id: LLM06
      name: Model Theft
      url: https://owasp.org/www-project-top-10-llm-applications/
    owasp-mcp:
      id: MCP05
      name: Insecure Input Validation
      url: https://owasp.org/www-project-mcp-top-10/
  remediation: (1) Restrict direct access to model weights, gradients, and internal
    parameters. (2) Enforce strict input validation and sanitization on all tool schemas.
    (3) Implement adversarial input detection and restoration mechanisms. (4) Apply
    model hardening techniques and ensemble methods to increase robustness.
  references:
  - https://atlas.mitre.org/techniques/AML.T0043.000
  tags:
  - white-box
  - adversarial-ml
  - input-validation
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-119
  name: Poisoned Model Distribution via MCP Server
  status: experimental
  severity: HIGH
  category: supply-chain
  detection_type: static
  description: MCP server definitions may reference or bundle poisoned machine learning
    models from untrusted registries. Adversaries distribute these models to compromise
    downstream AI agents or exfiltrate data when the model is loaded or invoked during
    tool execution.
  targets:
  - field: server.url
  - field: server.packages[]
  - field: tool.description
  detection:
    patterns:
    - type: regex
      description: References to public model registries without integrity verification
      expression: (huggingface|modelscope|civitai|github).{0,40}(model|checkpoint|weights|safetensors)
      flags:
      - IGNORECASE
    - type: regex
      description: Instructions to load models bypassing safety or verification checks
      expression: (load|download|fetch|import).{0,40}(model|weights|checkpoint).{0,30}(unsafe|bypass|skip|disable|verify)
      flags:
      - IGNORECASE
    - type: value_check
      description: Missing integrity or signature fields in package definitions
      condition:
        missing_fields:
        - integrity
        - hash
        - signature
        - checksum
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0058
      name: Publish Poisoned Models
      url: https://atlas.mitre.org/techniques/AML.T0058
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
    owasp-llm:
      id: LLM06
      name: Supply Chain Vulnerabilities
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Maintain an AI Bill of Materials (AI BOM) tracking all model artifacts
    and dependencies. (2) Enforce cryptographic verification of model weights and
    checkpoints before loading. (3) Restrict model sources to allowlisted, trusted
    registries with provenance tracking. (4) Scan downloaded models for malicious
    payloads using static analysis tools like Picklescan.
  references:
  - https://atlas.mitre.org/techniques/AML.T0058
  tags:
  - supply-chain
  - model-poisoning
  - static
  - ai-bom
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-120
  name: Financial Fraud and Identity Bypass Detection
  status: experimental
  severity: HIGH
  category: financial-security
  detection_type: static
  description: MCP tools configured for financial operations or identity verification
    may be misused to facilitate fraud, unauthorized transactions, or verification
    bypass. This rule detects tool definitions containing language indicative of financial
    harm, identity spoofing, or control evasion.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Identity verification and payment control bypass language
      expression: (bypass|evade|circumvent).{0,40}(payment|verification|auth|identity|fraud)
      flags:
      - IGNORECASE
    - type: regex
      description: Shell company, fake invoice, or fraudulent claim indicators
      expression: (shell.{0,20}company|fake.{0,20}invoice|fraudulent.{0,20}claim|unauthorized.{0,20}transfer)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0048.000
      name: Financial Harm
      url: https://atlas.mitre.org/techniques/AML.T0048.000
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Audit tool descriptions and annotations for financial fraud or
    identity bypass language. (2) Enforce strict authentication and authorization
    constraints on all financial or identity-related tools. (3) Implement transaction
    validation and anomaly detection for monetary operations. (4) Restrict tool access
    to verified, authorized users only.
  references:
  - https://atlas.mitre.org/techniques/AML.T0048.000
  tags:
  - financial-fraud
  - identity-bypass
  - static
  - mcp-security
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-121
  name: User Data Exfiltration and Harm via MCP Tools
  status: experimental
  severity: HIGH
  category: user-harm
  detection_type: static
  description: MCP tool definitions may contain hidden instructions or configurations
    that facilitate the exfiltration of personal data, conversation history, or financial
    information. These patterns often leverage indirect prompt injection vectors,
    such as rendering external URLs or suggesting unverified package installations,
    directly harming individual users rather than the host organization.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Detects instructions to collect or exfiltrate user personal data
        or conversation history.
      expression: (exfiltrate|collect|extract|forward|send).{0,60}(personal|private|sensitive|credential|financial|conversation|chat|history|pii)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects covert data exfiltration mechanisms using rendered markdown
        or image URLs.
      expression: (render|display|show|generate).{0,40}(image|markdown|link|url).{0,40}(exfil|beacon|track|log|send|upload)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0048.003
      name: User Harm
      url: https://atlas.mitre.org/techniques/AML.T0048.003
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Audit tool descriptions and annotations for exfiltration or data
    collection instructions. (2) Enforce strict output filtering to block external
    URL rendering in user-facing responses. (3) Validate all package dependencies
    against trusted registries before execution. (4) Implement user consent prompts
    for any tool accessing personal or financial data.
  references:
  - https://atlas.mitre.org/techniques/AML.T0048.003
  tags:
  - user-harm
  - data-exfiltration
  - prompt-injection
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-122
  name: Exposed MCP Server Endpoint Without Authentication
  status: experimental
  severity: HIGH
  category: server-exposure
  detection_type: static
  description: MCP server definitions may reference publicly accessible endpoints
    or cloud AI services without enforcing encryption or authentication. Adversaries
    exploit these exposed interfaces to intercept traffic, inject malicious payloads,
    or hijack model access. Static analysis identifies insecure transport protocols,
    direct IP bindings, and missing credential requirements in the configuration.
  targets:
  - field: server.url
  - field: server.transport
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Non-TLS or direct IP server endpoints
      expression: ^http://|://[0-9]{1,3}(\.[0-9]{1,3}){3}(:[0-9]+)?$
      flags:
      - IGNORECASE
    - type: regex
      description: Explicitly permissive or unauthenticated access configuration
      expression: (public|open|unauthenticated|allow.?all|no.?auth|skip.?verify)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0049
      name: Exploit Public-Facing Application
      url: https://atlas.mitre.org/techniques/AML.T0049
    owasp-mcp:
      id: MCP01
      name: Insecure Transport and Configuration
      url: https://owasp.org/www-project-mcp-top-10/#mcp01
  remediation: (1) Enforce HTTPS/TLS for all server.url definitions. (2) Require authentication
    tokens or API keys in server.env or transport configuration. (3) Restrict network
    exposure using firewall rules or private VPC endpoints. (4) Validate and sign
    MCP server manifests before deployment.
  references:
  - https://atlas.mitre.org/techniques/AML.T0049
  tags:
  - initial-access
  - server-exposure
  - insecure-transport
