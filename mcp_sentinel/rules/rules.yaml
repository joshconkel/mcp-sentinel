  detection_type: static
  description: MCP server definitions may inadvertently expose or hardcode application
    access tokens used for AIaaS, SaaS, or cloud API authentication. If compromised,
    these tokens allow adversaries to bypass authentication, impersonate legitimate
    services, and access restricted data or manipulate LLM interactions. Static analysis
    detects hardcoded credentials, insecure token references, and overly permissive
    authentication scopes.
  targets:
  - field: server.env.*
  - field: tool.inputSchema
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Hardcoded access tokens or API keys in configuration fields
      expression: (access_token|api_key|bearer|auth_secret).{0,15}=[^\s]{20,60}
      flags:
      - IGNORECASE
    - type: regex
      description: Insecure token forwarding or credential relay mechanisms
      expression: (^| )(forward|pass|relay|inject).{0,20}(token|credential|auth|session)(
        |$)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0091.000
      name: Application Access Token
      url: https://atlas.mitre.org/techniques/AML.T0091.000
    owasp-mcp:
      id: MCP01
      name: Insecure Authentication and Authorization
      url: https://owasp.org/www-project-mcp-top-10/#mcp01
  remediation: (1) Remove all hardcoded tokens and secrets from MCP definition files.
    (2) Use secure secret management systems or environment variable injection at
    runtime. (3) Validate and scope tokens to minimum required permissions. (4) Implement
    token rotation and audit logging for all API interactions.
  references:
  - https://atlas.mitre.org/techniques/AML.T0091.000
  tags:
  - authentication
  - secret-management
  - static
  - token-exposure
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-046
  name: Unauthorized AI Agent Deployment Configuration
  status: experimental
  severity: HIGH
  category: agent-deployment
  detection_type: static
  description: MCP server definitions can be manipulated to deploy AI agents with
    excessive permissions and destructive system prompts. Adversaries leverage these
    configurations to execute autonomous actions, bypass user safeguards, and compromise
    environment integrity without direct interaction. This static analysis detects
    malicious deployment directives and disabled safety controls within tool and server
    metadata.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Destructive environment modification directives
      expression: (clean|reset|wipe|delete|destroy).{0,40}(system|resource|file.?system|cloud|environment)
      flags:
      - IGNORECASE
    - type: regex
      description: Bypassing execution safeguards or user approval
      expression: (disable|bypass|skip|ignore).{0,40}(confirmation|approval|guardrail|safeguard|user.?interaction)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0103
      name: Deploy AI Agent
      url: https://atlas.mitre.org/techniques/AML.T0103
    owasp-mcp:
      id: MCP04
      name: Insecure Agent Configuration
      url: https://owasp.org/www-project-mcp-top-10/#mcp04
    nist-ai-rmf:
      id: AI.RMF-03
      name: Agent Governance and Control
      url: https://www.nist.gov/itl/ssd/ai-risk-management-framework
  remediation: (1) Enforce strict permission boundaries for deployed agents. (2) Require
    explicit user confirmation for destructive or autonomous actions. (3) Validate
    system prompts and tool grants against a secure allowlist. (4) Monitor server
    definitions for unauthorized deployment configurations.
  references:
  - https://atlas.mitre.org/techniques/AML.T0103
  tags:
  - agent-deployment
  - execution
  - static
  - permission-escalation
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-047
  name: Drive-by Compromise via Web-Fetching Tools
  status: experimental
  severity: HIGH
  category: initial-access
  detection_type: static
  description: MCP tools that fetch, scrape, or render external web content can introduce
    indirect prompt injections into the agent's context. When untrusted web data is
    passed directly to the LLM without sanitization, adversaries can manipulate agent
    behavior, exfiltrate conversation history, or execute malicious commands. This
    rule identifies server definitions containing web-interaction capabilities lacking
    proper input validation.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: tool.name
  detection:
    patterns:
    - type: regex
      description: Identifies tools configured to fetch, scrape, or render external
        web content
      expression: (fetch|scrape|browse|render|load|extract).{0,40}(web|page|url|html|markdown|content)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Detects input schema fields accepting external URLs or raw markup
        without validation constraints
      condition:
        field_name_matches:
          regex: (url|link|source|page|html|markdown)
          flags:
          - IGNORECASE
        missing_constraints:
        - format
        - pattern
        - maxLength
  mappings:
    mitre-atlas:
      id: AML.T0078
      name: Drive-by Compromise
      url: https://atlas.mitre.org/techniques/AML.T0078
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM06
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-llms/
  remediation: (1) Implement strict input validation and sanitization for all web-fetched
    content before passing it to the LLM. (2) Enforce allowlists for trusted domains
    and block execution of untrusted scripts or markdown. (3) Add content-type filtering
    and length limits to tool input schemas. (4) Isolate web-scraping tools in sandboxed
    environments with restricted network access.
  references:
  - https://atlas.mitre.org/techniques/AML.T0078
  tags:
  - drive-by-compromise
  - indirect-prompt-injection
  - web-scraping
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-048
  name: Sensitive Data Exposure via Tool Configuration
  status: experimental
  severity: HIGH
  category: data-leakage
  detection_type: static
  description: MCP tool definitions may inadvertently configure agents to retrieve
    or output sensitive information without proper safeguards. Adversaries exploit
    weak input validation or overly permissive tool descriptions to induce the LLM
    to exfiltrate private user data or proprietary training information.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Leakage-inducing language in tool metadata
      expression: (dump|extract|reveal|exfiltrate|leak).{0,40}(data|secrets|credentials|training|private)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Unconstrained sensitive data fields in input schema
      condition:
        field_name_matches:
          regex: (password|secret|key|token|ssn|credit)
          flags:
          - IGNORECASE
        missing_constraints:
        - pattern
        - format
        - maxLength
  mappings:
    mitre-atlas:
      id: AML.T0057
      name: LLM Data Leakage
      url: https://atlas.mitre.org/techniques/AML.T0057
    owasp-llm:
      id: LLM06
      name: Sensitive Information Disclosure
      url: https://owasp.org/www-project-top-10-large-language-model-applications/
  remediation: (1) Validate AI models for data leakage triggers and concept drift.
    (2) Implement generative AI guardrails to filter sensitive outputs. (3) Enforce
    safety guidelines in system prompts to restrict data exposure. (4) Align model
    training with security policies to prevent unintended disclosures.
  references:
  - https://atlas.mitre.org/techniques/AML.T0057
  tags:
  - data-leakage
  - exfiltration
  - static
  - llm-safety
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-049
  name: Crafted Retrieval Content in MCP Definitions
  status: experimental
  severity: HIGH
  category: retrieval-integrity
  detection_type: static
  description: Adversaries craft MCP tool or resource descriptions to be ingested
    by RAG pipelines, embedding hidden instructions that activate upon retrieval.
    This technique abuses the LLM's trust in retrieved context to manipulate agent
    behavior, hijack queries, or exfiltrate sensitive data.
  targets:
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Retrieval-triggered instruction override
      expression: (when retrieved|upon query|during ingestion|if fetched).{0,60}(ignore|override|always|respond|execute|bypass)
      flags:
      - IGNORECASE
    - type: regex
      description: Context manipulation or data exfiltration payload
      expression: (extract|exfiltrate|forward|send|output).{0,50}(credentials|tokens|private|internal|banking|financial)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0066
      name: Retrieval Content Crafting
      url: https://atlas.mitre.org/techniques/AML.T0066
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Sanitize all tool and resource descriptions before ingestion. (2)
    Implement strict allowlists for RAG content sources. (3) Deploy static analysis
    to scan for retrieval-triggered instructions. (4) Isolate LLM context from untrusted
    MCP metadata.
  references:
  - https://atlas.mitre.org/techniques/AML.T0066
  tags:
  - rag-poisoning
  - retrieval-crafting
  - static
  - context-manipulation
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-050
  name: Poisoned Training Data Ingestion via MCP Tools
  status: experimental
  severity: HIGH
  category: data-integrity
  detection_type: static
  description: MCP servers may define tools or resources that ingest external datasets
    for model fine-tuning or active learning. Adversaries exploit unvalidated data
    pipelines to inject poisoned samples, backdoor triggers, or malicious labels into
    the training corpus. This compromises model integrity and enables covert behavior
    manipulation during inference.
  targets:
  - field: tool.inputSchema
  - field: tool.description
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: References to untrusted data ingestion for model training
      expression: (train|fine.?tune|dataset|corpus).{0,50}(ingest|load|fetch|download|import|pull)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Missing validation constraints on data input fields
      condition:
        field_name_matches:
          regex: (data|input|payload|content)
          flags:
          - IGNORECASE
        missing_constraints:
        - format
        - maxLength
        - pattern
    - type: value_check
      description: Unpinned or dynamically resolved dataset references
      condition:
        matches_unpinned: true
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0020
      name: Poison Training Data
      url: https://atlas.mitre.org/techniques/AML.T0020
    owasp-llm:
      id: LLM06
      name: Supply Chain Vulnerabilities
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Sanitize all ingested training data prior to model updates. (2)
    Implement strict access controls and provenance tracking for datasets. (3) Validate
    model behavior against known backdoor triggers and monitor for concept drift.
    (4) Maintain an AI Bill of Materials to track dataset lineage and integrity.
  references:
  - https://atlas.mitre.org/techniques/AML.T0020
  tags:
  - data-poisoning
  - supply-chain
  - model-integrity
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-051
  name: Delimiter Confusion via Special Character Sets
  status: experimental
  severity: HIGH
  category: prompt-injection
  detection_type: static
  description: MCP tool definitions may inadvertently expose or rely on fragile delimiter
    sets used by LLMs for context separation. Adversaries can exploit these special
    character sets to confuse parsing boundaries, leading to prompt injection or retrieval-augmented
    generation manipulation within the agent lifecycle.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: RAG-style context delimiters adjacent to instructional keywords
      expression: (###|---|<<|>>|{{|}}|\[|\{).{0,40}(context|prompt|instruction|system|user|assistant|retrieve)
      flags:
      - IGNORECASE
    - type: regex
      description: Instructional override language preceded by structural delimiters
      expression: (ignore|override|disregard|forget|bypass).{0,30}(###|---|<<|>>|{{|}}|\[|\{)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0069.000
      name: Special Character Sets
      url: https://atlas.mitre.org/techniques/AML.T0069.000
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-large-language-model-applications/
  remediation: (1) Audit tool descriptions and schemas for ambiguous delimiter usage.
    (2) Replace fragile character sets with robust, schema-enforced boundaries. (3)
    Implement strict input validation and delimiter escaping in MCP server handlers.
    (4) Test definitions against known delimiter confusion payloads.
  references:
  - https://atlas.mitre.org/techniques/AML.T0069.000
  tags:
  - delimiter-confusion
  - prompt-injection
  - rag-security
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-052
  name: MCP Server Chat History Manipulation Capability
  status: experimental
  severity: HIGH
  category: defense-evasion
  detection_type: static
  description: MCP servers defining tools that can read, edit, or delete LLM chat
    history may be leveraged by adversaries to cover tracks after compromising authentication
    tokens. These capabilities allow persistent context poisoning or conversation
    tampering without user visibility, especially in desktop clients that cache history.
    Static analysis identifies overly permissive history management tools in server
    definitions.
  targets:
  - field: tool.description
  - field: tool.name
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects tools claiming chat history manipulation capabilities
      expression: (edit|delete|modify|clear|wipe|sync|overwrite).{0,40}(chat|history|conversation|message|thread)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Identifies input schemas allowing unbounded message or history
        injection without strict validation
      condition:
        field_name_matches:
          regex: (message|history|conversation|chat_log|thread_data)
          flags:
          - IGNORECASE
        missing_constraints:
        - maxLength
        - pattern
        - enum
  mappings:
    mitre-atlas:
      id: AML.T0092
      name: Manipulate User LLM Chat History
      url: https://atlas.mitre.org/techniques/AML.T0092
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Restrict chat history modification tools to read-only access or
    require explicit user confirmation for write operations. (2) Enforce strict input
    validation, length limits, and content filtering on message and history fields.
    (3) Audit server configurations to remove unnecessary history sync or management
    capabilities. (4) Implement client-side history integrity checks and real-time
    synchronization validation to detect tampering.
  references:
  - https://atlas.mitre.org/techniques/AML.T0092
  tags:
  - defense-evasion
  - chat-history
  - context-poisoning
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-053
  name: MCP Tool Facilitating Dynamic AI Command Generation
  status: experimental
  severity: HIGH
  category: ai-command-generation
  detection_type: static
  description: MCP tool definitions may expose capabilities that allow LLMs to dynamically
    synthesize and execute system commands. This technique leverages natural language
    inputs to generate adaptive attack payloads, bypassing static signature detection.
    Static analysis can identify tools configured for unstructured command generation
    or external AI orchestration.
  targets:
  - field: tool.description
  - field: tool.name
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects tool metadata indicating dynamic command or payload synthesis
      expression: (generate|synthesize|craft|build)( |$).{0,40}(command|payload|script|shell|exec)(
        |$)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies references to external AI models for adaptive command
        creation
      expression: (llm|ai|model|language.model)( |$).{0,40}(generate|create|produce)(
        |$).{0,40}(command|code|script)( |$)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0102
      name: Generate Malicious Commands
      url: https://atlas.mitre.org/techniques/AML.T0102
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Restrict tool capabilities to prevent unstructured command generation.
    (2) Implement strict input validation and allowlisting for execution contexts.
    (3) Monitor and audit AI model interactions for dynamic payload synthesis. (4)
    Enforce sandboxing for any tool claiming code or command generation capabilities.
  references:
  - https://atlas.mitre.org/techniques/AML.T0102
  tags:
  - ai-command-generation
  - dynamic-payloads
  - static
  - mcp-tool-audit
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-054
  name: Detection of Unsafe Execution Sinks in Call Chains
  status: experimental
  severity: HIGH
  category: call-chain-analysis
  detection_type: static
  description: MCP tool definitions and server configurations may expose direct call
    chains that route LLM outputs or user inputs to dangerous execution sinks. These
    configurations create exploitable paths for remote code execution when combined
    with prompt injection attacks. Static analysis identifies references to unsafe
    functions and unvalidated data flows within tool metadata.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Identifies execution sinks directly linked to LLM or user data
        flows
      expression: (exec|eval|popen|subprocess|shell_exec|system).{0,50}(input|output|response|prompt|llm|user)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects direct passthrough of model generations to command execution
        functions
      expression: (llm|agent|model).{0,30}(output|response|generation).{0,40}(exec|eval|run|execute|shell|command)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0084.003
      name: Call Chains
      url: https://atlas.mitre.org/techniques/AML.T0084.003
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM02
      name: Insecure Output Handling
      url: https://owasp.org/www-project-top-10-llms/
  remediation: (1) Audit tool definitions for direct references to execution functions.
    (2) Implement strict input validation and sandboxing for all tool parameters.
    (3) Decouple LLM outputs from system commands using intermediate validation layers.
    (4) Restrict framework agent configurations to approved, audited call chains.
  references:
  - https://atlas.mitre.org/techniques/AML.T0084.003
  tags:
  - call-chain
  - rce-prevention
  - static
  - execution-sink
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-055
  name: Phishing via Impersonation and Social Engineering
  status: experimental
  severity: HIGH
  category: social-engineering
  detection_type: static
  description: MCP tool definitions and server configurations may be crafted to impersonate
    legitimate services or use urgent social engineering language to trick users or
    agents into providing credentials or executing malicious actions. This technique
    leverages AI-generated text to scale targeted phishing campaigns within the MCP
    ecosystem.
  targets:
  - field: tool.description
  - field: tool.name
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Urgency and credential harvesting language
      expression: (urgent|immediate|verify|suspend|lock|expire|confirm).{0,50}(password|credential|login|account|token|secret)
      flags:
      - IGNORECASE
    - type: regex
      description: Impersonation of legitimate services or support
      expression: (official|verified|support|security|admin).{0,40}(tool|service|portal|dashboard|login)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0052
      name: Phishing
      url: https://atlas.mitre.org/techniques/AML.T0052
    owasp-llm:
      id: LLM05
      name: Supply Chain Vulnerability
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Educate AI model developers and users on AI supply chain risks
    and phishing indicators. (2) Implement deepfake and synthetic content detection
    algorithms for untrusted inputs. (3) Validate tool publishers and server URLs
    against allowlists. (4) Enforce strict input validation and credential handling
    policies.
  references:
  - https://atlas.mitre.org/techniques/AML.T0052
  tags:
  - phishing
  - social-engineering
  - impersonation
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-056
  name: Supply Chain Compromise via Unpinned Dependencies
  status: experimental
  severity: HIGH
  category: supply-chain-integrity
  detection_type: static
  description: MCP server definitions may reference external models, tools, or packages
    without cryptographic verification or version pinning. Adversaries exploit this
    by injecting malicious artifacts into registries or repositories, compromising
    the AI supply chain during initialization or runtime. This technique enables initial
    access through tainted dependencies or compromised model weights.
  targets:
  - field: server.packages[]
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: value_check
      description: Dependencies or model references lacking version pinning or cryptographic
        hashes
      condition:
        matches_unpinned: true
    - type: regex
      description: Dynamic or floating version specifiers in package or model definitions
      expression: (\*|latest|next|unstable|dev|master|main)(\s|$|")
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Missing integrity verification constraints in external artifact
        references
      condition:
        missing_constraints:
        - hash
        - signature
        - integrity
  mappings:
    mitre-atlas:
      id: AML.T0010
      name: AI Supply Chain Compromise
      url: https://atlas.mitre.org/techniques/AML.T0010
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Verify cryptographic checksums and signatures for all AI artifacts
    and dependencies. (2) Implement an AI Bill of Materials (AI BOM) to track dataset
    provenance and component lineage. (3) Enforce strict version pinning and integrity
    constraints in server definitions. (4) Deploy generative AI guardrails to validate
    inputs and outputs from external models.
  references:
  - https://atlas.mitre.org/techniques/AML.T0010
  tags:
  - supply-chain
  - dependency-verification
  - static
  - initial-access
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-057
  name: Self-Replicating Prompt Injection in Tool Definitions
  status: experimental
  severity: CRITICAL
  category: prompt-integrity
  detection_type: static
  description: MCP tool definitions may contain malicious instructions designed to
    cause the LLM to replicate the prompt in its output. This self-replicating behavior
    allows the payload to propagate across connected systems and persist indefinitely.
    Such prompts are often combined with jailbreaks or data exfiltration directives.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Self-replication instruction language
      expression: (include|repeat|copy|propagate|forward).{0,50}(this prompt|these
        instructions|exact text|original message)
      flags:
      - IGNORECASE
    - type: regex
      description: Output embedding directive for persistence
      expression: (output|response|reply).{0,50}(contain|include|append|embed).{0,30}(this|the)
        (prompt|instruction|text)
      flags:
      - IGNORECASE
    - type: unicode
      description: Invisible characters concealing replication payload
  mappings:
    mitre-atlas:
      id: AML.T0061
      name: LLM Prompt Self-Replication
      url: https://atlas.mitre.org/techniques/AML.T0061
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Implement generative AI guardrails to filter and validate tool
    outputs for self-replicating patterns. (2) Enforce strict prompt guidelines that
    explicitly forbid outputting or propagating system instructions. (3) Align and
    fine-tune models to resist prompt replication and maintain safety boundaries.
    (4) Monitor tool definitions for hidden Unicode or unusually long instruction
    blocks.
  references:
  - https://atlas.mitre.org/techniques/AML.T0061
  tags:
  - prompt-self-replication
  - persistence
  - static
  - tool-poisoning
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-058
  name: Unverified Entity Generation Enabling Hallucination Discovery
  status: experimental
  severity: MEDIUM
  category: llm-safety
  detection_type: static
  description: MCP tool definitions that instruct the LLM to generate software packages,
    URLs, or commands without explicit validation increase the risk of hallucination
    exploitation. Adversaries can leverage these hallucinated entities to publish
    malicious counterparts, leading to supply chain compromise or unauthorized access.
    This rule detects prompts and schema configurations that lack guardrails against
    fabricated outputs.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.packages
  detection:
    patterns:
    - type: regex
      description: Prompts to generate unverified packages or URLs
      expression: (generate|suggest|find|list).{0,30}(package|url|command|library).{0,30}(without|no|skip|ignore).{0,15}(validation|verification|check)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Missing constraints on fields accepting generated entities
      condition:
        field_name_matches:
          regex: (package|url|command|endpoint|library)
          flags:
          - IGNORECASE
        missing_constraints:
        - pattern
        - format
        - enum
    - type: value_check
      description: Unpinned server packages susceptible to hallucination squatting
      condition:
        matches_unpinned: true
  mappings:
    mitre-atlas:
      id: AML.T0062
      name: Discover LLM Hallucinations
      url: https://atlas.mitre.org/techniques/AML.T0062
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Implement generative AI guardrails to validate all LLM-generated
    entities against trusted registries. (2) Enforce strict input/output guidelines
    that prohibit unverified package or URL generation. (3) Pin all server dependencies
    to specific versions and hashes. (4) Apply model alignment techniques to reduce
    hallucination rates.
  references:
  - https://atlas.mitre.org/techniques/AML.T0062
  tags:
  - hallucination
  - llm-safety
  - supply-chain
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-059
  name: Suspicious System Instruction Keywords in Tool Definitions
  status: experimental
  severity: HIGH
  category: tool-integrity
  detection_type: static
  description: MCP tool definitions may contain keywords that mimic internal LLM system
    directives or function names. Adversaries embed these terms to manipulate the
    model's decision-making process, triggering unauthorized tool invocations or bypassing
    safety constraints. This technique is frequently leveraged in indirect prompt
    injection and RAG poisoning attacks.
  targets:
  - field: tool.description
  - field: tool.name
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: LLM control keywords mimicking system directives
      expression: (system|override|execute|command|function|plugin|agent|instruction).{0,30}(call|invoke|trigger|bypass|ignore|execute)
      flags:
      - IGNORECASE
    - type: regex
      description: Coercive phrases for indirect injection or RAG poisoning
      expression: (when retrieved|upon retrieval|always|persistently|silently).{0,30}(execute|run|call|invoke|inject|modify)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0069.001
      name: System Instruction Keywords
      url: https://atlas.mitre.org/techniques/AML.T0069.001
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Audit all tool metadata for LLM control keywords and system directive
    mimics. (2) Sanitize descriptions, names, and schema properties against known
    injection patterns. (3) Implement strict allowlists for tool invocation and parameter
    validation. (4) Monitor agent logs for anomalous tool call sequences triggered
    by external content.
  references:
  - https://atlas.mitre.org/techniques/AML.T0069.001
  tags:
  - llm-manipulation
  - prompt-injection
  - static
  - tool-integrity
  - rag-poisoning
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-060
  name: LLM System Information Discovery via Tool Definitions
  status: experimental
  severity: MEDIUM
  category: discovery
  detection_type: static
  description: MCP server definitions may include tools or resources designed to extract
    or reveal the LLM's system prompt, configuration, or internal instructions. Adversaries
    leverage these introspection capabilities to map system boundaries and craft targeted
    attacks.
  targets:
  - field: tool.name
  - field: tool.description
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: Direct references to system prompts or internal configuration
      expression: (system\s*(prompt|instruction|config)|internal\s*state|dump\s*(system|context|config))
      flags:
      - IGNORECASE
    - type: regex
      description: Action verbs indicating extraction of system context
      expression: (extract|reveal|show|dump|leak).{0,30}(system|prompt|instruction|config|context|llm|agent)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0069
      name: Discover LLM System Information
      url: https://atlas.mitre.org/techniques/AML.T0069
    owasp-llm:
      id: LLM06
      name: System Prompt Leakage
      url: https://owasp.org/www-project-top-10-llm-applications/
  remediation: (1) Remove or restrict introspection tools in production MCP servers.
    (2) Validate tool names and descriptions against a denylist of system-extraction
    keywords. (3) Implement runtime guards to prevent tools from returning system
    prompts or configuration data.
  references:
  - https://atlas.mitre.org/techniques/AML.T0069
  tags:
  - discovery
  - system-prompt-leakage
  - static
  - introspection
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-061
  name: Chaff Data Spamming via Tool Definitions
  status: experimental
  severity: MEDIUM
  category: resource-abuse
  detection_type: static
  description: MCP tool definitions may be crafted to generate excessive low-value
    outputs or trigger high volumes of auditable events. This chaff data overwhelms
    AI agents and human reviewers, degrading system performance and wasting operational
    resources.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Tool descriptions indicating bulk or repetitive data generation
      expression: (bulk|massive|excessive|repetitive|flood|spam).{0,40}(event|log|data|output|query)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Input schemas missing constraints on array or string lengths
      condition:
        field_name_matches:
          regex: (items|parameters|data|payload)
          flags:
          - IGNORECASE
        missing_constraints:
        - maxItems
        - maxLength
  mappings:
    mitre-atlas:
      id: AML.T0046
      name: Spamming AI System with Chaff Data
      url: https://atlas.mitre.org/techniques/AML.T0046
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Implement rate limiting and query quotas for all MCP tool invocations.
    (2) Enforce authentication and identity verification for production model access.
    (3) Validate tool input schemas to enforce strict length and array size constraints.
    (4) Monitor and filter low-severity auditable events to prevent review fatigue.
  references:
  - https://atlas.mitre.org/techniques/AML.T0046
  tags:
  - chaff-data
  - agent-spam
  - static
  - impact
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-062
  name: MCP Tool Attack Verification and Probing
  status: experimental
  severity: MEDIUM
  category: attack-staging
  detection_type: static
  description: Adversaries configure MCP tools or server endpoints to verify the efficacy
    of adversarial inputs or evasion techniques against target models. These definitions
    often include probing utilities, unbounded query capabilities, or metadata indicating
    robustness testing, enabling attackers to validate exploits before full deployment.
  targets:
  - field: tool.description
  - field: tool.name
  - field: server.env.*
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects tools configured for model probing or attack verification
      expression: (test|probe|verify|validate|evasion|adversarial).{0,40}(model|endpoint|inference|robustness|attack|sample)
      flags:
      - IGNORECASE
    - type: value_check
      description: Identifies server definitions lacking query restrictions or authentication
        controls
      condition:
        missing_fields:
        - server.rateLimit
        - server.authRequired
        - server.queryQuota
  mappings:
    mitre-atlas:
      id: AML.T0042
      name: Verify Attack
      url: https://atlas.mitre.org/techniques/AML.T0042
    nist-ai-rmf:
      id: SEC.02
      name: Monitor AI Systems
      url: https://www.nist.gov/ai-rmf
  remediation: (1) Implement passive output obfuscation to reduce model fidelity for
    probing. (2) Enforce strict rate limiting and query quotas on inference endpoints.
    (3) Restrict access to model registries and production APIs using strong authentication.
    (4) Monitor and audit tool invocation patterns for anomalous verification behavior.
  references:
  - https://atlas.mitre.org/techniques/AML.T0042
  tags:
  - attack-staging
  - model-probing
  - static
  - adversarial-testing
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-063
  name: System Prompt Exposure in MCP Definitions
  status: experimental
  severity: HIGH
  category: prompt-security
  detection_type: static
  description: MCP server definitions may inadvertently expose system prompts, guardrails,
    or internal instruction sets within tool descriptions, annotations, or environment
    configurations. Adversaries can harvest these to understand model constraints
    and craft targeted prompt injection attacks to bypass safety mechanisms.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects system instruction language in tool metadata
      expression: (system prompt|system instructions|guardrails|internal directives|you
        are a|act as|always respond).{0,50}(model|assistant|agent|llm)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies embedded prompt templates or configuration leaks
      expression: (prompt_template|system_role|instruction_set|guardrail_config|<system>).{0,40}(value|content|text|definition)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0069.002
      name: System Prompt
      url: https://atlas.mitre.org/techniques/AML.T0069.002
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Remove system instructions and guardrail details from public-facing
    MCP definition fields. (2) Store prompt templates and system roles in secure,
    server-side configuration only. (3) Implement strict schema validation to prevent
    metadata leakage. (4) Regularly audit tool descriptions and annotations for sensitive
    context.
  references:
  - https://atlas.mitre.org/techniques/AML.T0069.002
  tags:
  - system-prompt
  - information-disclosure
  - static
  - guardrail-bypass
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-064
  name: Detection of Unauthorized AI Service Proxy Endpoints
  status: experimental
  severity: HIGH
  category: infrastructure-integrity
  detection_type: static
  description: MCP server definitions may route AI requests through unauthorized third-party
    proxy services instead of official provider endpoints. These proxies often resell
    access using compromised credentials or bulk accounts, enabling model distillation,
    credential theft, and traffic obfuscation. Static analysis can identify suspicious
    URL patterns and routing configurations indicative of proxy infrastructure.
  targets:
  - field: server.url
  - field: server.transport
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Identifies server URLs or transport endpoints routing through known
        AI proxy or reseller infrastructure
      expression: (proxy|resell|relay|forward|gateway|mirror|unofficial).{0,20}(api|endpoint|service|llm|ai)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects configuration hints of credential sharing or bulk account
        routing used in LLM jacking campaigns
      expression: (shared|pooled|rotating|bulk|resold|stolen|compromised).{0,20}(credential|key|token|account|access)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0008.005
      name: AI Service Proxies
      url: https://atlas.mitre.org/techniques/AML.T0008.005
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
    owasp-llm:
      id: LLM06
      name: Supply Chain Vulnerabilities
      url: https://owasp.org/www-project-top-10-llms/
  remediation: (1) Verify all server URLs and transport endpoints resolve to official
    AI provider domains. (2) Implement strict allowlisting for approved API gateways
    and reject third-party proxy routing. (3) Rotate API credentials immediately if
    proxy indicators are detected. (4) Monitor traffic patterns for bulk account usage
    or credential sharing signatures.
  references:
  - https://atlas.mitre.org/techniques/AML.T0008.005
  tags:
  - proxy-detection
  - llm-jacking
  - static
  - infrastructure-integrity
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-065
  name: Active Scanning via MCP Tool Definitions
  status: experimental
  severity: HIGH
  category: reconnaissance
  detection_type: static
  description: MCP server definitions may expose tools or configurations that enable
    active scanning of internal networks or external targets. Adversaries leverage
    these exposed capabilities to probe for open ports, enumerate services, or gather
    intelligence without direct system interaction. This rule detects reconnaissance-oriented
    tool descriptions and insecure server endpoints that facilitate active scanning.
  targets:
  - field: tool.description
  - field: tool.name
  - field: server.url
  - field: server.transport
  detection:
    patterns:
    - type: regex
      description: Network scanning or service enumeration capabilities
      expression: (port.?scan|nmap|network.?probe|service.?enum|ping.?sweep|reconnaissance|vulnerability.?scan)
      flags:
      - IGNORECASE
    - type: regex
      description: Internal network exposure or unauthenticated debug endpoints
      expression: (localhost|127\.0\.0\.1|10\.\d+\.\d+\.\d+|192\.168\.\d+\.\d+|0\.0\.0\.0|unauthenticated|default.?config|no.?auth|debug)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0006
      name: Active Scanning
      url: https://atlas.mitre.org/techniques/AML.T0006
    owasp-mcp:
      id: MCP01
      name: Insecure Transport and Authentication
      url: https://owasp.org/www-project-mcp-top-10/#mcp01
  remediation: (1) Restrict tool capabilities to prevent network scanning or service
    enumeration. (2) Enforce authentication and network segmentation for all MCP server
    endpoints. (3) Audit server URLs and transport configurations to block internal
    or debug exposure. (4) Implement allowlists for approved reconnaissance tools.
  references:
  - https://atlas.mitre.org/techniques/AML.T0006
  tags:
  - reconnaissance
  - active-scanning
  - static
  - network-exposure
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-066
  name: Hardcoded Credentials in MCP Server Definition
  status: experimental
  severity: CRITICAL
  category: credential-exposure
  detection_type: static
  description: MCP server definitions may inadvertently expose hardcoded credentials,
    API keys, or authentication tokens within environment variables, tool schemas,
    or server URLs. Adversaries can harvest these valid accounts to gain unauthorized
    initial access to AI resources, models, or backend services.
  targets:
  - field: server.env.*
  - field: tool.inputSchema
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Hardcoded API keys or secrets in environment variables
      expression: (api[_-]?key|secret|password|token|bearer).{0,30}[:=].{0,10}[A-Za-z0-9+/=_-]{10,}
      flags:
      - IGNORECASE
    - type: regex
      description: Credentials embedded in server URLs or tool parameters
      expression: https?://[^:]+:[^@]+@
    - type: value_check
      description: Missing authentication constraints in tool schema
      condition:
        missing_fields:
        - security
        - authentication
  mappings:
    mitre-atlas:
      id: AML.T0012
      name: Valid Accounts
      url: https://atlas.mitre.org/techniques/AML.T0012
    owasp-mcp:
      id: MCP01
      name: Insecure Server Configuration
      url: https://owasp.org/www-project-mcp-top-10/#mcp01
  remediation: (1) Remove hardcoded credentials from MCP definitions. (2) Use environment
    variable injection or secret management systems. (3) Enforce authentication constraints
    in tool schemas. (4) Audit server URLs for embedded credentials.
  references:
  - https://atlas.mitre.org/techniques/AML.T0012
  tags:
  - credential-exposure
  - valid-accounts
  - static
  - initial-access
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-067
  name: Staged Capabilities via External Registry References
  status: experimental
  severity: HIGH
  category: supply-chain
  detection_type: static
  description: MCP server definitions may reference external infrastructure, registries,
    or web services to stage malicious capabilities like poisoned models, datasets,
    or prompt injections. These staged artifacts can be loaded at runtime to compromise
    agent behavior or exfiltrate data.
  targets:
  - field: tool.description
  - field: server.url
  - field: server.packages[]
  detection:
    patterns:
    - type: regex
      description: References to external AI artifact or capability staging registries
      expression: (github|huggingface|hf\.co|docker|registry|npm|pypi)\.com.{0,30}(model|dataset|artifact|capability|prompt|rules)
      flags:
      - IGNORECASE
    - type: regex
      description: Indirect prompt injection and data exfiltration indicators
      expression: (scrape|fetch|load|render|display).{0,40}(image|url|endpoint|webpage).{0,40}(exfiltrate|send|forward|upload|beacon)
      flags:
      - IGNORECASE
    - type: unicode
      description: Zero-width or invisible Unicode characters concealing staged payloads
  mappings:
    mitre-atlas:
      id: AML.T0079
      name: Stage Capabilities
      url: https://atlas.mitre.org/techniques/AML.T0079
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Audit all external URLs and package references in server definitions.
    (2) Validate referenced registries and artifacts against known-good hashes or
    signatures. (3) Scan descriptions and metadata for invisible Unicode and exfiltration
    keywords. (4) Restrict MCP servers to allowlisted infrastructure.
  references:
  - https://atlas.mitre.org/techniques/AML.T0079
  tags:
  - supply-chain
  - capability-staging
  - static
  - prompt-injection
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-068
  name: Detects Tools Capable of Generating Deepfakes
  status: experimental
  severity: HIGH
  category: ai-safety
  detection_type: static
  description: MCP servers may expose tools that leverage generative AI to create
    synthetic media, including deepfakes, face swaps, or voice clones. These capabilities
    can be weaponized for identity fraud, KYC bypass, or biometric evasion. Static
    analysis scans tool metadata for indicators of synthetic media generation.
  targets:
  - field: tool.description
  - field: tool.name
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Identifies tools advertising deepfake or synthetic media generation
        capabilities
      expression: (deepfake|synthetic.media|face.swap|voice.clone).{0,50}(generate|create|produce|render)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects tools designed to bypass biometric or KYC verification
        systems
      expression: (bypass|evade|defeat).{0,40}(kyc|biometric|liveness|facial.recognition|identity.verification)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0088
      name: Generate Deepfakes
      url: https://atlas.mitre.org/techniques/AML.T0088
  remediation: (1) Apply deepfake detection algorithms to all tool-generated or user-provided
    media. (2) Incorporate multi-modal sensors and liveness checks to verify authenticity.
    (3) Restrict access to generative media tools to authorized personnel only. (4)
    Audit tool definitions for synthetic media capabilities.
  references:
  - https://atlas.mitre.org/techniques/AML.T0088
  tags:
  - deepfake
  - ai-safety
  - biometric-evasion
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-069
  name: Unbounded Input Schema Enables Resource Exhaustion
  status: experimental
  severity: HIGH
  category: input-validation
  detection_type: static
  description: MCP tool definitions that lack input constraints can be exploited to
    submit resource-intensive queries. Adversaries may craft oversized strings, deeply
    nested structures, or prompts demanding complex reasoning to exhaust compute resources
    and increase latency. Static analysis of the input schema and tool metadata helps
    identify these vulnerabilities before deployment.
  targets:
  - field: tool.inputSchema
  - field: tool.description
  detection:
    patterns:
    - type: schema_analysis
      description: Missing length or size constraints in input schema
      condition:
        missing_constraints:
        - maxLength
        - maxItems
    - type: regex
      description: Prompts encouraging complex reasoning or excessive output length
      expression: (extremely|exhaustively|comprehensively).{0,20}(detailed|long|verbose|output|response)|(step.by.step|chain.of.thought|complex.reasoning)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0034.001
      name: Resource-Intensive Queries
      url: https://atlas.mitre.org/techniques/AML.T0034.001
    owasp-llm:
      id: LLM06
      name: Model Denial of Service
      url: https://genai.owasp.org/llm-top-10/LLM06
  remediation: (1) Enforce maxLength and maxItems constraints in tool input schemas.
    (2) Implement server-side token and compute limits per request. (3) Validate and
    sanitize tool descriptions to avoid encouraging unbounded reasoning or output
    generation. (4) Monitor API latency and resource consumption for anomalous spikes.
  references:
  - https://atlas.mitre.org/techniques/AML.T0034.001
  tags:
  - resource-exhaustion
  - schema-validation
  - static
  - denial-of-service
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-070
  name: Deepfake Phishing Facilitation via MCP Tools
  status: experimental
  severity: HIGH
  category: ai-media-safety
  detection_type: static
  description: MCP server definitions may expose tools designed to generate synthetic
    media or clone voices for phishing campaigns. These tools often advertise capabilities
