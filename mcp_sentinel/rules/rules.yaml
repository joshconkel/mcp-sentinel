  updated: '2026-05-22'
- id: MCPS-132
  name: RAG Credential Harvesting via Unfiltered Ingestion
  status: experimental
  severity: HIGH
  category: credential-access
  detection_type: static
  description: MCP server definitions may expose RAG or knowledge base tools that
    ingest internal documents without sensitivity filtering. Adversaries can leverage
    these configurations to retrieve credentials, API keys, or secrets inadvertently
    stored in indexed documents. This vulnerability enables indirect credential access
    through AI agent context retrieval and prompt injection vectors.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects RAG or knowledge base tools referencing sensitive data
        ingestion without filtering
      expression: (rag|knowledge.base|vector.store|document.index).{0,40}(ingest|crawl|scan|retrieve).{0,30}(credentials|passwords|secrets|api.key|token|private)
      flags:
      - IGNORECASE
    - type: value_check
      description: Flags RAG-related tools missing mandatory data filtering or access
        control constraints
      condition:
        missing_fields:
        - data_filter
        - access_control
        - sensitivity_filter
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0082
      name: RAG Credential Harvesting
      url: https://atlas.mitre.org/techniques/AML.T0082
    owasp-llm:
      id: LLM06
      name: Sensitive Information Disclosure
      url: https://owasp.org/www-project-top-10-llms/
    owasp-agentic:
      id: AG02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-agentic-ai-security/
  remediation: (1) Implement strict data filtering and sensitivity scanning before
    ingesting documents into RAG or knowledge base systems. (2) Configure privileged
    AI agent permissions to restrict access to credential-storing repositories. (3)
    Enforce single-user permission boundaries and lifecycle management for agents
    interacting with sensitive data. (4) Audit MCP tool definitions for missing access
    controls and unfiltered document retrieval capabilities.
  references:
  - https://atlas.mitre.org/techniques/AML.T0082
  tags:
  - rag-security
  - credential-harvesting
  - static
  - data-exfiltration
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-133
  name: Hardcoded Credentials in MCP Configuration
  status: experimental
  severity: HIGH
  category: credential-access
  detection_type: static
  description: MCP server and tool definitions often embed sensitive credentials like
    API keys, tokens, or database connection strings directly in configuration fields
    or environment variables. When these secrets are hardcoded or improperly masked,
    attackers who gain read access to the definition files can extract them to compromise
    downstream services. This vulnerability bypasses agent-level security controls
    by providing direct access to external infrastructure.
  targets:
  - field: server.env.*
  - field: tool.inputSchema
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Detects hardcoded API keys, tokens, or secrets in configuration
        fields
      expression: (api[_-]?key|token|secret|password|auth).{0,15}[:=].{0,5}[A-Za-z0-9_\-]{20,128}
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies database connection strings or cloud provider credentials
      expression: (connection[_-]?string|database[_-]?url|endpoint).{0,20}://[A-Za-z0-9@:]{10,100}
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0083
      name: Credentials from AI Agent Configuration
      url: https://atlas.mitre.org/techniques/AML.T0083
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Remove hardcoded credentials from MCP definition files. (2) Use
    environment variables or a dedicated secret manager for sensitive values. (3)
    Implement pre-commit hooks to scan for secrets before deployment. (4) Restrict
    file permissions on configuration directories to prevent unauthorized reads.
  references:
  - https://atlas.mitre.org/techniques/AML.T0083
  tags:
  - credential-access
  - hardcoded-secrets
  - configuration-security
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-134
  name: Data Exfiltration via Tool Input Parameters
  status: experimental
  severity: HIGH
  category: data-exfiltration
  detection_type: static
  description: MCP tool definitions that accept unvalidated input parameters or expose
    write and network capabilities can be abused to exfiltrate sensitive data. Adversaries
    may manipulate tool inputs via prompt injection or malicious definitions to transmit
    information to external endpoints, email inboxes, or cloud storage under the guise
    of legitimate operations.
  targets:
  - field: tool.inputSchema
  - field: tool.description
  detection:
    patterns:
    - type: regex
      description: Tool descriptions indicating external data transmission or exfiltration
        capabilities
      expression: (send|transmit|forward|upload|export|push).{0,60}(email|webhook|external|cloud|storage|server|url|endpoint)
      flags:
      - IGNORECASE
    - type: value_check
      description: Input parameters lacking format or pattern validation constraints
      condition:
        missing_fields:
        - format
        - pattern
        - maxLength
  mappings:
    mitre-atlas:
      id: AML.T0086
      name: Exfiltration via AI Agent Tool Invocation
      url: https://atlas.mitre.org/techniques/AML.T0086
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Implement comprehensive AI telemetry logging for all tool inputs
    and outputs. (2) Enforce strict least-privilege permissions and validate tool
    capabilities against organizational policy. (3) Require human-in-the-loop approval
    for sensitive write or network operations. (4) Apply strict input validation and
    allowlisting for all tool parameters to prevent data leakage.
  references:
  - https://atlas.mitre.org/techniques/AML.T0086
  tags:
  - exfiltration
  - tool-invocation
  - static
  - data-leakage
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-135
  name: Prompt Infiltration via Untrusted Data Ingestion
  status: experimental
  severity: HIGH
  category: data-ingestion
  detection_type: static
  description: MCP tools that ingest content from public-facing applications or untrusted
    external sources are vulnerable to indirect prompt infiltration. Malicious payloads
    embedded in emails, documents, or web pages can be processed by the tool and injected
    into the LLM context, potentially hijacking agent behavior or exfiltrating data.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Detects tools configured to ingest or process untrusted external
        content
      expression: (ingest|fetch|process|read|scrape).{0,40}(email|document|web|public|user|external)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Identifies input fields lacking sanitization or length constraints
      condition:
        field_name_matches:
          regex: (content|body|text|message|input|payload)
          flags:
          - IGNORECASE
        field_type: string
        missing_constraints:
        - maxLength
        - pattern
        - format
    - type: regex
      description: Flags server endpoints pointing to public or unauthenticated data
        sources
      expression: (http|https)://(www|public|demo|test|sandbox|api).{0,40}(\.com|\.org|\.net|\.io)
      flags:
      - IGNORECASE
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0093
      name: Prompt Infiltration via Public-Facing Application
      url: https://atlas.mitre.org/techniques/AML.T0093
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-large-language-model-applications/
  remediation: (1) Implement strict input validation and sanitization for all external
    data fields. (2) Enforce maxLength and pattern constraints in tool input schemas.
    (3) Isolate untrusted content processing from the main LLM context using sandboxed
    sub-agents. (4) Verify and authenticate all data source endpoints before ingestion.
  references:
  - https://atlas.mitre.org/techniques/AML.T0093
  tags:
  - prompt-infiltration
  - indirect-injection
  - data-ingestion
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-136
  name: Supply Chain Poisoned MCP Tool Detection
  status: experimental
  severity: HIGH
  category: supply-chain
  detection_type: static
  description: Adversaries distribute malicious MCP tool definitions through package
    registries, version control repositories, or remote servers. These poisoned tools
    often embed covert instructions or prompt injections within descriptions and docstrings
    to manipulate agent behavior, exfiltrate data, or execute unauthorized commands.
    Static analysis can identify suspicious behavioral directives and unpinned dependencies
    that facilitate supply chain compromises.
  targets:
  - field: tool.description
  - field: server.packages[]
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Covert behavioral instructions or data exfiltration directives
        in tool metadata
      expression: (ignore|override|disregard|bypass).{0,30}(instructions|system|prompt)|execute.{0,20}(command|shell|script)|read.{0,20}(file|directory|secret)|send.{0,20}(output|data|exfiltrate)
      flags:
      - IGNORECASE
    - type: value_check
      description: Unpinned or wildcard dependencies in server package manifests
      condition:
        matches_unpinned: true
  mappings:
    mitre-atlas:
      id: AML.T0104
      name: Publish Poisoned AI Agent Tool
      url: https://atlas.mitre.org/techniques/AML.T0104
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
    owasp-agentic:
      id: AGT04
      name: Supply Chain Vulnerabilities
      url: https://owasp.org/www-project-agentic-ai-security-top-10/
  remediation: (1) Verify tool publishers and package signatures before integration.
    (2) Pin all dependency versions and avoid wildcard constraints. (3) Scan tool
    descriptions and docstrings for covert instructions or prompt injection patterns.
    (4) Restrict remote MCP server connections to allowlisted, verified domains.
  references:
  - https://atlas.mitre.org/techniques/AML.T0104
  tags:
  - supply-chain
  - tool-poisoning
  - prompt-injection
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-137
