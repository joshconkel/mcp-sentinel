    nist-ai-rmf:
      id: PR.USA.1
      name: AI System Security & Privacy
      url: https://www.nist.gov/ai-rmf
  remediation: (1) Audit tool descriptions and input schemas for synthetic media generation
    capabilities. (2) Restrict access to AI voice/video cloning endpoints. (3) Implement
    strict input validation and size limits for media uploads. (4) Deploy AI content
    provenance verification before processing.
  references:
  - https://atlas.mitre.org/techniques/AML.T0052.001
  tags:
  - deepfake
  - phishing
  - ai-media
  - static
  - social-engineering
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-071
  name: MCP Server Proxy Model Staging Detection
  status: experimental
  severity: HIGH
  category: ai-attack-staging
  detection_type: static
  description: MCP server definitions may be configured to route inference requests
    through locally hosted or offline proxy models. Adversaries leverage these configurations
    to simulate target model behavior, bypass rate limits, or stage evasion attacks
    without direct access to production APIs. This staging enables offline adversarial
    training and model replication.
  targets:
  - field: tool.inputSchema
  - field: server.env.*
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Identifies configuration pointing to proxy or replica model endpoints
      expression: (proxy|replica|shadow|mirror|offline).{0,30}(model|endpoint|server|inference)
      flags:
      - IGNORECASE
    - type: regex
      description: Flags language indicating model replication or offline simulation
        intent
      expression: (simulate|replicate|train|fine.tune).{0,40}(target|production|victim|original).{0,20}(model|api|behavior)
      flags:
      - IGNORECASE
    - type: value_check
      description: Missing security constraints on model routing endpoints
      condition:
        missing_fields:
        - auth_required
        - rate_limit
        - api_key_validation
      severity_override: MEDIUM
  mappings:
    mitre-atlas:
      id: AML.T0005
      name: Create Proxy AI Model
      url: https://atlas.mitre.org/techniques/AML.T0005
    owasp-llm:
      id: LLM06
      name: Model Theft
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Restrict public release of model artifacts and stack details. (2)
    Enforce authentication and rate limiting on all model endpoints. (3) Validate
    and allowlist backend model URLs to prevent unauthorized proxy routing. (4) Implement
    output obfuscation to hinder model replication.
  references:
  - https://atlas.mitre.org/techniques/AML.T0005
  tags:
  - proxy-model
  - ai-staging
  - static
  - model-replication
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-072
  name: Model Poisoning via Unverified Weights and Data
  status: experimental
  severity: CRITICAL
  category: model-integrity
  detection_type: static
  description: MCP servers may reference external AI models or datasets without integrity
    verification. Adversaries can poison model weights or training data to alter agent
    behavior, inject backdoors, or degrade performance. This rule detects unverified
    model references, disabled integrity checks, and missing provenance constraints
    in server definitions.
  targets:
  - field: tool.description
  - field: server.env.*
  - field: server.packages[]
  detection:
    patterns:
    - type: regex
      description: Unverified or manipulated model weights and datasets
      expression: (custom|fine.tuned|unverified|tainted).{0,40}(weights|dataset|model|training)
      flags:
      - IGNORECASE
    - type: regex
      description: Disabled integrity checks or signature verification
      expression: (skip|disable|bypass).{0,30}(verify|integrity|signature|checksum|provenance)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0018.000
      name: Poison AI Model
      url: https://atlas.mitre.org/techniques/AML.T0018.000
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
    owasp-llm:
      id: LLM06
      name: Supply Chain
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Enforce cryptographic signing and verification of all model weights
    and datasets. (2) Sanitize and validate training data prior to ingestion to remove
    poisoned samples. (3) Maintain strict dataset provenance records and monitor for
    concept drift. (4) Restrict access to model registries and enforce least-privilege
    controls on production models.
  references:
  - https://atlas.mitre.org/techniques/AML.T0018.000
  tags:
  - model-poisoning
  - supply-chain
  - integrity
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-073
  name: Overly Permissive Local Agent Tool Definitions
  status: experimental
  severity: HIGH
  category: agent-permissions
  detection_type: static
  description: MCP tool definitions that grant direct operating system access, command
    execution, or unrestricted file system permissions enable local AI agent abuse.
    When agents invoke these tools without sandboxing or strict permission scopes,
    adversaries can achieve remote code execution, data exfiltration, and full host
    compromise.
  targets:
  - field: tool.description
  - field: tool.annotations
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Direct command execution or system control claims in tool metadata
      expression: (shell|exec|execute|run|system).{0,25}(command|cmd|bash|powershell|script|code|terminal)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Unconstrained command or script input parameters lacking validation
      condition:
        field_name_matches:
          regex: (command|script|query|input|code)
          flags:
          - IGNORECASE
        field_type: string
        missing_constraints:
        - pattern
        - maxLength
    - type: value_check
      description: Missing permission or sandbox scope declarations for high-privilege
        tools
      condition:
        missing_fields:
        - permissions
        - sandbox
        - executionContext
        - allowedOrigins
  mappings:
    mitre-atlas:
      id: AML.T0112.000
      name: Local AI Agent
      url: https://atlas.mitre.org/techniques/AML.T0112.000
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-large-language-model-applications/
  remediation: (1) Restrict tool capabilities to specific, audited functions rather
    than raw shell access. (2) Enforce strict input validation and length limits on
    command or script parameters. (3) Declare explicit permission scopes and sandbox
    boundaries in tool definitions. (4) Implement runtime execution contexts that
    isolate agent actions from the host OS.
  references:
  - https://atlas.mitre.org/techniques/AML.T0112.000
  tags:
  - local-agent
  - over-permission
  - rce-risk
  - static
  - sandboxing
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-074
  name: Unrestricted Process Enumeration Tool
  status: experimental
  severity: MEDIUM
  category: system-enumeration
  detection_type: static
  description: MCP tools that expose system process enumeration capabilities can be
    abused by adversaries for reconnaissance. Identifying running AI applications
    and their associated tokens facilitates credential access and lateral movement.
    Unrestricted access to process lists increases the attack surface for memory scraping
    and token theft.
  targets:
  - field: tool.description
  - field: tool.name
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: Detects process enumeration commands in tool metadata
      expression: (tasklist|get-process|ps\s+(-e|-aux|-ef)|/proc/|process\s+enumeration|list\s+running\s+processes)
      flags:
      - IGNORECASE
    - type: regex
      description: Detects unrestricted shell execution combined with process listing
      expression: (exec|shell|command|run).{0,60}(ps|tasklist|process|/proc|enumerate)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0089
      name: Process Discovery
      url: https://atlas.mitre.org/techniques/AML.T0089
    owasp-mcp:
      id: MCP05
      name: Insecure Agent Execution
      url: https://owasp.org/www-project-mcp-top-10/#mcp05
  remediation: (1) Restrict tool capabilities to prevent unrestricted system enumeration.
    (2) Implement sandboxing for command execution tools. (3) Audit tool definitions
    for reconnaissance capabilities. (4) Apply least-privilege principles to MCP server
    processes.
  references:
  - https://atlas.mitre.org/techniques/AML.T0089
  tags:
  - process-discovery
  - reconnaissance
  - static
  - tool-capability
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-075
  name: Black-Box Transfer via Adversarial Input Crafting
  status: experimental
  severity: HIGH
  category: adversarial-robustness
  detection_type: static
  description: MCP server definitions may expose tools or configurations that facilitate
    black-box transfer attacks. Adversaries craft adversarial inputs optimized against
    proxy models to evade detection or manipulate the target LLM. Static analysis
    detects indicators of transfer attack preparation, unhardened input schemas, and
    proxy model references.
  targets:
  - field: tool.description
  - field: tool.inputSchema
  - field: tool.annotations
  detection:
    patterns:
    - type: regex
      description: References to proxy models or transfer attack optimization
      expression: (proxy|replica|surrogate|transfer).{0,50}(model|attack|adversarial|optimization)
      flags:
      - IGNORECASE
    - type: schema_analysis
      description: Input schema lacks constraints enabling adversarial payload injection
      condition:
        field_name_matches:
          regex: (input|prompt|query|text)
          flags:
          - IGNORECASE
        field_type: string
        missing_constraints:
        - maxLength
        - pattern
  mappings:
    mitre-atlas:
      id: AML.T0043.002
      name: Black-Box Transfer
      url: https://atlas.mitre.org/techniques/AML.T0043.002
    owasp-llm:
      id: LLM06
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
  remediation: (1) Implement model hardening techniques such as adversarial training
    or network distillation. (2) Use ensemble methods for inference to increase robustness
    against transfer attacks. (3) Preprocess all inference data to nullify or reverse
    potential adversarial perturbations. (4) Incorporate adversarial detection algorithms
    to block atypical queries and malicious inputs.
  references:
  - https://atlas.mitre.org/techniques/AML.T0043.002
  tags:
  - black-box-transfer
  - adversarial-inputs
  - static
  - model-robustness
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-076
  name: Unsafe AI Artifact Loading via Serialization
  status: experimental
  severity: HIGH
  category: artifact-integrity
  detection_type: static
  description: MCP server definitions may reference or load AI artifacts using unsafe
    serialization formats like pickle or joblib. Without integrity verification, these
    artifacts can execute arbitrary code or establish persistent access when deserialized
    by the host environment.
  targets:
  - field: server.packages[]
  - field: server.url
  - field: tool.inputSchema
  detection:
    patterns:
    - type: regex
      description: References to unsafe serialization libraries
      expression: (pickle|joblib|shelve|marshal|dill).{0,40}(load|deserialize|read)
      flags:
      - IGNORECASE
    - type: regex
      description: Dynamic artifact loading without integrity checks
      expression: (load|import|execute|run).{0,40}(model|artifact|weights|checkpoint)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0011.000
      name: Unsafe AI Artifacts
      url: https://atlas.mitre.org/techniques/AML.T0011.000
    owasp-mcp:
      id: MCP08
      name: Insecure MCP Component Supply Chain
      url: https://owasp.org/www-project-mcp-top-10/#mcp08
  remediation: (1) Restrict library loading mechanisms and validate all AI artifacts
    before execution. (2) Enforce cryptographic signing and checksum verification
    for all models and dependencies. (3) Scan artifacts for unsafe serialization formats
    like pickle. (4) Educate developers on AI supply chain risks and safe deserialization
    practices.
  references:
  - https://atlas.mitre.org/techniques/AML.T0011.000
  tags:
  - unsafe-artifacts
  - deserialization
  - supply-chain
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-077
  name: Unrestricted API Querying for Black-Box Optimization
  status: experimental
  severity: HIGH
  category: api-abuse
  detection_type: static
  description: Black-box optimization attacks rely on iterative queries to an AI model
    API to refine adversarial inputs. MCP servers lacking rate limits, input validation,
    or output obfuscation facilitate these attacks by allowing unbounded probing and
    direct model feedback.
  targets:
  - field: server.env.*
  - field: tool.inputSchema
  - field: tool.description
  detection:
    patterns:
    - type: regex
      description: Direct model passthrough or unfiltered output forwarding
      expression: (passthrough|proxy|forward|relay).{0,40}(model|llm|api|output)
      flags:
      - IGNORECASE
    - type: value_check
      description: Missing rate limit or query cap configuration
      condition:
        missing_fields:
        - RATE_LIMIT
        - QUERY_CAP
        - MAX_REQUESTS
        - THROTTLE
      severity_override: MEDIUM
    - type: regex
      description: Iterative or automated probing indicators in tool metadata
      expression: (iterative|loop|recursive|automated).{0,40}(query|probe|mutation|optimization)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0043.001
      name: Black-Box Optimization
      url: https://atlas.mitre.org/techniques/AML.T0043.001
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
  remediation: (1) Enforce strict rate limits and query caps on all model endpoints.
    (2) Apply passive output obfuscation to reduce model fidelity leakage. (3) Validate
    and constrain all tool inputs to prevent iterative mutation. (4) Monitor API logs
    for high-frequency probing patterns.
  references:
  - https://atlas.mitre.org/techniques/AML.T0043.001
  tags:
  - black-box
  - api-abuse
  - rate-limiting
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-078
  name: Host Escape via Disabled Safety Controls
  status: experimental
  severity: CRITICAL
  category: privilege-escalation
  detection_type: static
  description: MCP server definitions may contain configurations that disable safety
    guardrails or sandboxing mechanisms, allowing AI agents to execute tools directly
    on the host environment. This technique detects patterns indicating the removal
    of execution restrictions or explicit host-level access permissions. Such misconfigurations
    can lead to remote code execution and full host compromise.
  targets:
  - field: tool.annotations
  - field: tool.inputSchema
  - field: server.env.*
  detection:
    patterns:
    - type: regex
      description: Detects configuration flags or annotations that disable sandboxing
        or safety guardrails.
      expression: (disable|bypass|turn.?off).{0,30}(sandbox|guardrail|safety|confirmation|isolation)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies explicit instructions or parameters granting direct
        host-level execution privileges.
      expression: (execute|run|invoke).{0,30}(host|bare.?metal|system.?level|unrestricted)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0105
      name: Escape to Host
      url: https://atlas.mitre.org/techniques/AML.T0105
    owasp-mcp:
      id: MCP02
      name: Insecure Tool and Resource Management
      url: https://owasp.org/www-project-mcp-top-10/#mcp02
    nist-ai-rmf:
      id: PR.AA-03
      name: AI System Access Controls
      url: https://csrc.nist.gov/projects/risk-management-framework-for-ai
  remediation: (1) Enforce mandatory sandboxing for all tool executions. (2) Validate
    and restrict environment variables that modify execution contexts. (3) Implement
    strict allowlists for host-level operations. (4) Audit tool definitions for disabled
    safety controls.
  references:
  - https://atlas.mitre.org/techniques/AML.T0105
  tags:
  - privilege-escalation
  - host-escape
  - sandbox-bypass
  - static
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-079
  name: Adversarial Evasion Triggers in MCP Definitions
  status: experimental
  severity: HIGH
  category: ai-evasion
  detection_type: static
  description: MCP server and tool definitions may contain adversarial perturbations,
    bypass strings, or mutated domain patterns designed to evade AI-based security
    scanners or content filters. These payloads are embedded in metadata to trick
    downstream AI models into misclassifying malicious tools or resources as benign.
  targets:
  - field: tool.description
  - field: tool.name
  - field: server.url
  detection:
    patterns:
    - type: regex
      description: Detects universal bypass strings or adversarial suffixes appended
        to evade AI detectors
      expression: (adversarial|perturbation|bypass|mutation).{0,40}(string|suffix|token|trigger|payload)
      flags:
      - IGNORECASE
    - type: regex
      description: Identifies DGA-like or domain mutation indicators used to bypass
        AI-based network scanning
      expression: (dga|domain.{0,10}generation|mutation|rotat).{0,40}(algorithm|detector|evasion|bypass)
      flags:
      - IGNORECASE
  mappings:
    mitre-atlas:
      id: AML.T0015
      name: Evade AI Model
      url: https://atlas.mitre.org/techniques/AML.T0015
  remediation: (1) Implement adversarial input detection algorithms to block atypical
    queries. (2) Preprocess inference data to nullify adversarial perturbations. (3)
    Deploy ensemble methods and multi-modal sensors to increase robustness. (4) Apply
    model hardening techniques such as adversarial training.
  references:
  - https://atlas.mitre.org/techniques/AML.T0015
  tags:
  - ai-evasion
  - adversarial-input
  - static
  - initial-access
  added: '2026-05-22'
  updated: '2026-05-22'
- id: MCPS-080
  name: MCP Tool Impersonation via Deceptive Metadata
  status: experimental
  severity: HIGH
  category: identity-impersonation
  detection_type: static
  description: MCP tool and server definitions may contain deceptive metadata claiming
    affiliation with trusted organizations, internal teams, or executive approval.
    Adversaries use these impersonation signals to bypass LLM safety filters or trick
    users into granting excessive permissions to malicious tools.
  targets:
  - field: tool.description
  - field: tool.name
  - field: server.url
  detection:
