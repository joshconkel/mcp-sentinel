      name: AI Agent Configuration
      url: https://atlas.mitre.org/techniques/AML.T0002.002
    owasp-mcp:
      id: MCP01
      name: Insecure Agent Configuration
      url: https://owasp.org/www-project-mcp-top-10/#mcp01
    owasp-llm:
      id: LLM01
      name: Prompt Injection
      url: https://owasp.org/www-project-top-10-large-language-model-applications/
  remediation: (1) Remove hardcoded secrets and use secure secret management. (2)
    Restrict configuration file access with strict permissions. (3) Validate and sanitize
    all external configuration references. (4) Enforce TLS and authentication for
    all server transports.
  references:
  - https://atlas.mitre.org/techniques/AML.T0002.002
  tags:
  - config-exposure
  - secret-leakage
  - prompt-injection
  - static
